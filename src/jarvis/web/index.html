<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>JARVIS</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<style>
:root {
  --bg: #191919;
  --bg-2: #1c1c1c;
  --card: #232323;
  --card-2: #252525;
  --border: #2e2e2e;
  --border-2: #3a3a3a;
  --text: #eaeaea;
  --text-2: #d0d0d0;
  --text-3: #8a8a8a;
  --accent: #6b8bd6;
  --accent-soft: #2a3556;
  --user-bg: #2d375a;
  --user-border: rgba(107,139,214,0.32);
  --user-text: #e8edfb;
  --code-bg: rgba(0,0,0,0.28);
  --code-text: #cdd8ee;
  --mono: 'JetBrains Mono', ui-monospace, monospace;
  --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
  /* Polish — 추가 토큰 */
  --border-strong: #353535;
  --divider:       #2a2a2a;
  --surface-2:     #262626;
  --surface-3:     #2e2e2e;
  /* Polish — typography & spacing tokens */
  --font-body-1:   15px;     /* 일기 본문 */
  --font-body-2:   13.5px;   /* 사이드바 일반 */
  --font-meta:     11.5px;   /* 헤더 unit, 보조정보 */
  --line-body:     1.65;     /* 본문 줄간격 */
  --paragraph-gap: 0.7em;    /* 마크다운 p 간격 */
  /* Tool-call tone */
  --tool-text:     var(--text-3);
  --tool-bg:       transparent;
  --tool-border:   var(--border);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--bg); color: var(--text); font: 14px/1.5 var(--sans); }
button, input { font-family: inherit; color: inherit; }

.app { display: grid; grid-template-rows: 56px auto auto 1fr; height: 100vh; overflow: hidden; }

/* Header */
.header { display: flex; align-items: center; padding: 0 28px; border-bottom: 1px solid var(--border); background: var(--bg-2); gap: 24px; }
.logo { display: inline-flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 800; letter-spacing: 0.02em; color: var(--text); }
.logo::before { content: ''; width: 8px; height: 8px; background: var(--accent); border-radius: 50%; }
.search-pill { flex: 1; max-width: 560px; margin: 0 auto; height: 32px; display: flex; align-items: center; padding: 0 14px; background: var(--card); border: 1px solid var(--border); border-radius: 999px; color: var(--text-3); gap: 8px; }
.search-pill:focus-within { border-color: var(--accent); }
.search-pill input { flex: 1; background: transparent; border: 0; outline: 0; color: var(--text); font-size: 13px; }
.search-pill input::placeholder { color: var(--text-3); }
.search-pill .kbd { font: 11px/1 var(--mono); padding: 2px 6px; border: 1px solid var(--border-2); border-radius: 4px; color: var(--text-3); }
.header-spacer { flex: 0 1 auto; }
.cleaned-toggle, .ws-label {
  font: var(--font-meta)/1 var(--mono);
  color: var(--text-3);
  padding: 5px 11px;
  border-radius: 6px;
  cursor: pointer;
  border: 1px solid var(--border-2);
  user-select: none;
  background: var(--bg);
  display: inline-flex; align-items: center; gap: 6px;
}
.cleaned-toggle:hover, .ws-label:hover {
  color: var(--text); background: var(--card); border-color: var(--border-strong);
}
.cleaned-toggle.active { color: #e9eefb; background: var(--accent-soft); border-color: var(--accent); }
.ws-label::after { content: ' ▾'; opacity: 0.5; font-size: 10px; }
.ws-label .ws-name { color: var(--text); font-weight: 600; }
.ws-label-wrap { position: relative; display: inline-block; }
.ws-menu {
  position: absolute; top: 100%; right: 0;
  margin-top: 6px;
  background: var(--bg-2); border: 1px solid var(--border-2); border-radius: 8px;
  min-width: 240px; box-shadow: 0 8px 28px rgba(0,0,0,0.5);
  z-index: 100; padding: 6px; display: none;
}
.ws-menu.open { display: block; }
.ws-menu-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; font-size: 13px; cursor: pointer; border-radius: 5px; color: var(--text-2); }
.ws-menu-item:hover { background: var(--card); color: var(--text); }
.ws-menu-item.active { background: var(--accent-soft); color: #e9eefb; }
.ws-menu-item .ep-count { font: 10.5px/1 var(--mono); color: var(--text-3); }
.ws-menu-item.active .ep-count { color: #e9eefb; opacity: 0.85; }
/* Episode divider */
.episode-divider {
  display: flex; align-items: center; gap: 12px;
  margin: 28px 0 18px;
  color: var(--text-2);
  font: 12px/1 var(--mono);
  user-select: none;
}
.episode-divider::before, .episode-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.episode-divider .ep-date { font-size: 13px; font-weight: 700; color: var(--text); letter-spacing: 0.02em; }
.episode-divider .ep-tag  { padding: 2px 10px; border: 1px solid var(--border-2); border-radius: 999px; background: var(--bg-2); font-size: 10.5px; color: var(--text-3); }
.episode-divider .ep-meta { font-size: 11px; color: var(--text-3); }
/* Header stats pill (workspace heartbeat) — num·unit·range 3단 위계 */
.stats-pill {
  font: 12px/1 var(--sans);
  color: var(--text-3);
  padding: 7px 14px;
  border-radius: 999px; border: 1px solid var(--border-2); background: var(--bg);
  white-space: nowrap; display: inline-flex; align-items: center; gap: 10px;
}
.stats-pill .sep   { color: var(--text-3); opacity: 0.4; }
.stats-pill .num   { color: var(--text); font-weight: 700; font-size: 13px; font-family: var(--mono); }
.stats-pill .unit  { color: var(--text-2); font-size: 11.5px; }
.stats-pill .range { color: var(--text-3); font: var(--font-meta)/1 var(--mono); }
.stats-pill .live  { width: 6px; height: 6px; border-radius: 50%; background: #5fb56b; box-shadow: 0 0 6px rgba(95,181,107,0.7); display: inline-block; }
.stats-pill.loading { opacity: 0.45; }

/* Home dashboard (replaces onboarding) */
.home-dashboard { max-width: 1100px; margin: 0 auto; padding: 22px 4px 36px; display: grid; grid-template-columns: 1fr 1fr; grid-auto-rows: auto; gap: 18px; }
.home-card { background: var(--card); border: 1px solid var(--border-strong); border-radius: 12px; padding: 18px 20px; min-height: 180px; display: flex; flex-direction: column; }
.home-card h3 { font-size: 12px; font-weight: 700; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 14px; display: flex; justify-content: space-between; align-items: baseline; }
.home-card h3 .count { font: 11px/1 var(--mono); color: var(--text-3); font-weight: 500; text-transform: none; letter-spacing: 0; }
.home-card .empty-mini { color: var(--text-3); font-size: 12px; line-height: 1.55; padding: 16px 4px; opacity: 0.85; }
.home-card.span-2 { grid-column: 1 / -1; }

/* P8 — per-day pair (JARVIS + Argos side-by-side) */
.recent-day { margin-bottom: 12px; }
.recent-day:last-child { margin-bottom: 0; }
.recent-day .day-label { font: 11px/1 var(--mono); color: var(--accent); margin-bottom: 6px; padding-left: 2px; letter-spacing: 0.02em; }
.recent-day .pair { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.recent-day .pair.single { grid-template-columns: 1fr; }

.recent-row { padding: 11px 12px; background: var(--bg-2); border: 1px solid var(--border-2); border-radius: 8px; cursor: pointer; transition: border-color 0.15s; display: flex; flex-direction: column; min-height: 84px; }
.recent-row:hover { border-color: var(--accent); }
.recent-row.paused { background: transparent; border-style: dashed; opacity: 0.65; cursor: default; }
.recent-row.paused:hover { border-color: var(--border-2); }
.recent-row .head { display: flex; gap: 8px; align-items: baseline; margin-bottom: 5px; }
.recent-row .subj { font-size: 13px; color: var(--text); font-weight: 600; }
.recent-row .turn-n { font: 10.5px/1 var(--mono); color: var(--text-3); margin-left: auto; }
.recent-row.paused .turn-n { color: var(--text-3); font-style: italic; }
.recent-row .preview { font-size: 12px; color: var(--text-2); line-height: 1.5; max-height: 4.5em; overflow: hidden; white-space: pre-wrap; }

.otd-row { padding: 10px 12px; background: var(--bg-2); border-left: 2px solid var(--accent); border-radius: 4px; margin-bottom: 8px; }
.otd-row:last-child { margin-bottom: 0; }
.otd-row .otd-meta { font: 11px/1 var(--mono); color: var(--text-3); margin-bottom: 5px; }
.otd-row .otd-meta .days-ago { color: var(--accent); }
.otd-row .otd-sum { font-size: 12.5px; color: var(--text-2); line-height: 1.5; max-height: 4.5em; overflow: hidden; }

/* ===== Brief Card (재설계 — 3섹션 세로 적층) ===== */
.brief-card { padding: 20px 22px 22px; }
.brief-card > h3 { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.brief-card .brief-head-meta { display: inline-flex; align-items: center; gap: 8px; text-transform: none; letter-spacing: 0; }
.brief-card .brief-head-meta .count { font: 11px/1 var(--mono); color: var(--text-3); font-weight: 500; }

/* ===== 시각 통일 배지 — 본문 헤더 · Brief 카드 헤더 ===== */
.diary-ws-name {
  color: var(--accent);
  font-weight: 700;
  letter-spacing: -0.005em;
}
.diary-mode-badge {
  display: inline-block;
  margin-left: 8px;
  padding: 2px 8px;
  font-size: 11.5px;
  font-weight: 400;
  background: var(--surface-3);
  color: var(--text-3);
  border-radius: 999px;
  vertical-align: middle;
  font-family: var(--mono);
  letter-spacing: 0;
}
.brief-mode-badge {
  display: inline-block;
  margin-left: 8px;
  padding: 2px 8px;
  font-size: 11.5px;
  font-weight: 500;
  background: rgba(107,139,214,0.15);
  color: var(--accent);
  border: 1px solid rgba(107,139,214,0.3);
  border-radius: 999px;
  font-family: var(--sans);
  letter-spacing: 0;
  text-transform: none;
}
/* 활성 ws 칩 — 현재 선택된 ws 강조 */
.brief-ws-chip.is-current {
  border: 2px solid var(--accent);
  background: var(--surface-3);
}
.brief-ws-chip.is-current:hover { background: var(--accent-soft); }

/* 공통 섹션 */
.brief-section { display: flex; flex-direction: column; gap: 10px; }
.brief-section-h { font: 11px/1 var(--mono); color: var(--text-3); text-transform: uppercase; letter-spacing: 0.08em; display: flex; align-items: baseline; gap: 8px; }
.brief-section-count { font-size: 11px; color: var(--text-3); opacity: 0.7; }
.brief-divider { height: 1px; background: var(--divider); margin: 18px 0; }

/* === Section 1: 활성 ws 칩 (가로 3등분) === */
.brief-ws-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; }
.brief-ws-chip {
  appearance: none; text-align: left; cursor: pointer; font-family: inherit;
  background: var(--bg-2); border: 1px solid var(--border-2); border-radius: 10px;
  padding: 14px 16px; display: flex; flex-direction: column; gap: 8px;
  transition: border-color 0.15s, background 0.15s, transform 0.15s;
}
.brief-ws-chip:hover { border-color: var(--accent); background: var(--accent-soft); transform: translateY(-1px); }
/* Line 1 — 강조: dot · 이름(15px 700) · 태그 chip(우측) */
.brief-ws-chip-head { display: flex; align-items: center; gap: 8px; }
.brief-ws-dot { width: 8px; height: 8px; border-radius: 50%; flex: 0 0 8px; background: var(--text-3); }
.brief-ws-dot[data-tag="ACTIVE"]  { background: #5fb56b; box-shadow: 0 0 6px rgba(95,181,107,0.7); }
.brief-ws-dot[data-tag="QUIET"]   { background: #c8a14a; }
.brief-ws-dot[data-tag="DORMANT"] { background: var(--border-2); }
.brief-ws-name { font-size: 15px; font-weight: 700; color: var(--text); letter-spacing: -0.005em; }
.brief-ws-tag  { font: 10px/1 var(--mono); color: var(--text-3); padding: 3px 8px; border: 1px solid var(--border-2); border-radius: 999px; margin-left: auto; text-transform: uppercase; }
/* Line 2 — 보조: signal · ep수 · 7d/어제 · top subjects (12px text-3, num만 강조) */
.brief-ws-sub {
  font-size: 12px; line-height: 1.5; color: var(--text-3);
  display: flex; flex-wrap: wrap; align-items: baseline; gap: 4px 8px;
}
.brief-ws-sub .num    { color: var(--text-2); font-family: var(--mono); }
.brief-ws-sub .sep    { color: var(--text-3); opacity: 0.5; }
.brief-ws-sub .signal { color: var(--text-2); }
/* cumulative_summary 모드 — 2줄 clamp, 자연어 한 단락 */
.brief-ws-sub.is-cumulative {
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  color: var(--text-2);
}
.brief-ws-chip.is-dormant { opacity: 0.55; }
.brief-ws-chip.is-dormant .brief-ws-sub { color: var(--text-3); }

/* === Section 2: 최근 thread 리스트 === */
.brief-thread-list { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 12px; }
.brief-thread { display: grid; grid-template-columns: 22px 1fr; gap: 10px; cursor: pointer; padding: 4px 0; border-radius: 6px; transition: background 0.15s; }
.brief-thread:hover { background: var(--bg-2); }
.brief-thread-rank    { font: 13px/1 var(--mono); color: var(--accent); align-self: start; padding-top: 2px; text-align: center; }
.brief-thread-head    { display: flex; align-items: baseline; gap: 6px; flex-wrap: wrap; margin-bottom: 3px; }
.brief-thread-ws      { font-size: 12px; font-weight: 600; color: var(--text); }
.brief-thread-sep     { color: var(--text-3); }
.brief-thread-subject { font-size: 12.5px; color: var(--text); }
.brief-thread-meta    { font: 10.5px/1 var(--mono); color: var(--text-3); margin-left: auto; }
.brief-thread-summary { font-size: 11.5px; color: var(--text-2); line-height: 1.5; }
.brief-thread.is-missing .brief-thread-summary { color: var(--text-3); font-style: italic; }

/* === Section 3: 추천 카드 (가로 3등분) === */
.brief-rec-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; }
.brief-rec-new {
  appearance: none; text-align: left; cursor: pointer; font-family: inherit;
  background: var(--bg-2); border: 1px solid var(--border-2); border-radius: 10px;
  padding: 12px 14px; display: flex; flex-direction: column; gap: 8px;
  transition: border-color 0.15s, background 0.15s, transform 0.15s;
}
.brief-rec-new:hover { border-color: var(--accent); background: var(--accent-soft); transform: translateY(-1px); }
.brief-rec-new-head  { display: flex; align-items: center; gap: 8px; }
.brief-rec-new-rank  { font: 13px/1 var(--mono); color: var(--accent); width: 18px; text-align: center; }
.brief-rec-new-ws    { font-size: 11.5px; color: var(--text-2); font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.brief-rec-new-reason{ font: 10px/1 var(--mono); padding: 2px 6px; border-radius: 999px; margin-left: auto;
                       border: 1px solid var(--border-2); color: var(--text-3); }
.brief-rec-new-reason[data-reason="next_step"]          { color: #9bbef0; border-color: rgba(155,190,240,0.4); }
.brief-rec-new-reason[data-reason="open_question"]      { color: #c8a14a; border-color: rgba(200,161,74,0.4); }
.brief-rec-new-reason[data-reason="fallback_top_thread"]{ color: var(--text-3); }
.brief-rec-new-title { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.35; }
.brief-rec-new-detail{ font-size: 11.5px; color: var(--text-2); line-height: 1.5; }

/* === 액션 버튼 (헤더 우측, 통일된 surface 톤) === */
.brief-card .brief-act {
  appearance: none; font-family: inherit;
  background: var(--surface-2); border: 1px solid var(--border-2); border-radius: 6px;
  padding: 5px 10px; font-size: 11.5px; color: var(--text-2); cursor: pointer;
  transition: background 0.15s, border-color 0.15s, color 0.15s;
}
.brief-card .brief-act:hover { background: var(--surface-3); border-color: var(--accent); color: var(--text); }
.brief-card .brief-act-icon  { padding: 4px 8px; font-size: 13px; line-height: 1; }

/* === Fallback === */
.brief-card .brief-fallback { font-size: 12.5px; color: var(--text-3); padding: 14px 4px; line-height: 1.55; }
.brief-card .brief-fallback code { font-family: var(--mono); background: var(--bg-2); padding: 1px 4px; border-radius: 3px; font-size: 11px; color: var(--text-2); }

/* === Responsive === */
@media (max-width: 880px) {
  .brief-ws-grid, .brief-rec-grid { grid-template-columns: 1fr; }
}

.top-ent-chips { display: flex; flex-wrap: wrap; gap: 8px; }
.top-ent-chip { padding: 6px 12px; background: var(--bg-2); border: 1px solid var(--border-2); border-radius: 999px; cursor: pointer; font-size: 12.5px; color: var(--text-2); display: inline-flex; align-items: baseline; gap: 8px; transition: background 0.15s, border-color 0.15s; }
.top-ent-chip:hover { background: var(--accent-soft); border-color: var(--accent); color: #e9eefb; }
.top-ent-chip .ent-name { font-weight: 600; }
.top-ent-chip .ent-stat { font: 10.5px/1 var(--mono); color: var(--text-3); }
.top-ent-chip:hover .ent-stat { color: #c8d2ee; }

/* Ingest 장부 widget (P4) */
.ledger-head { display: flex; align-items: baseline; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
.ledger-badge { font: 11px/1 var(--mono); padding: 4px 9px; border-radius: 999px; border: 1px solid var(--border-2); background: var(--bg-2); color: var(--text-3); cursor: pointer; transition: border-color 0.15s, color 0.15s; }
.ledger-badge:hover { border-color: var(--accent); color: var(--text); }
.ledger-badge.warn { color: #d28a52; border-color: rgba(210,138,82,0.5); }
.ledger-badge.warn:hover { color: #f1a866; border-color: #d28a52; }
.ledger-rows { display: flex; flex-direction: column; gap: 6px; }
.ledger-row { display: flex; gap: 10px; align-items: baseline; padding: 8px 10px; background: var(--bg-2); border: 1px solid var(--border-2); border-radius: 6px; font-size: 12.5px; color: var(--text-2); }
.ledger-row .ts { font: 11px/1 var(--mono); color: var(--text-3); flex-shrink: 0; padding: 0; min-width: 95px; }
.ledger-row .fname { font-family: var(--mono); font-size: 12px; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; min-width: 0; }
.ledger-row .turn-n { font: 10.5px/1 var(--mono); color: var(--text-3); flex-shrink: 0; }
.ledger-row .dedup-tag { font: 10px/1 var(--mono); padding: 2px 6px; border-radius: 4px; flex-shrink: 0; text-transform: lowercase; }
.dedup-tag.new { background: rgba(95,181,107,0.15); color: #6dc77c; }
.dedup-tag.append_v2 { background: rgba(150,120,200,0.15); color: #a896d0; }
.dedup-tag.replaced { background: rgba(150,150,150,0.15); color: var(--text-3); }
.dedup-tag.rejected { background: rgba(200,90,90,0.15); color: #d27272; }
.ledger-row .via { font: 10.5px/1 var(--mono); color: var(--text-3); flex-shrink: 0; }

/* Ledger modal — full list */
.ledger-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(8,10,18,0.65); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 30px; }
.ledger-modal .inner { width: min(960px, 100%); max-height: 86vh; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 22px 24px; display: flex; flex-direction: column; }
.ledger-modal h2 { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
.ledger-modal .sub { font: 11px/1.5 var(--mono); color: var(--text-3); margin-bottom: 14px; }
.ledger-modal .close { position: absolute; top: 18px; right: 22px; background: transparent; border: 0; color: var(--text-3); font-size: 18px; cursor: pointer; }
.ledger-modal .close:hover { color: var(--text); }
.ledger-modal .scroll { flex: 1; overflow-y: auto; }
.ledger-modal section { margin-bottom: 20px; }
.ledger-modal section h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-2); margin-bottom: 10px; font-weight: 700; }

.avatar { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, #5a76b8, #8a6bcf); border: 1px solid var(--border-2); color: #fff; font-weight: 700; font-size: 13px; display: grid; place-items: center; }

/* Topics row */
.topics-row { display: flex; align-items: center; gap: 10px; padding: 10px 28px; border-bottom: 1px solid var(--border); background: var(--bg-2); flex-wrap: wrap; row-gap: 8px; }
.topic-sort { display: inline-flex; gap: 2px; padding: 2px; background: var(--bg); border: 1px solid var(--border-2); border-radius: 6px; font: 10px/1 var(--mono); margin-left: auto; flex-shrink: 0; }
.capsule.topic-hidden { display: none; }
.topics-more { height: 28px; padding: 0 12px; border-radius: 999px; border: 1px dashed var(--border-2); background: transparent; color: var(--text-3); font-size: 12px; cursor: pointer; }
.topics-more:hover { border-color: var(--accent); color: var(--text-2); border-style: solid; }
.topic-sort button { padding: 4px 8px; background: transparent; border: 0; color: var(--text-3); cursor: pointer; border-radius: 4px; font: inherit; }
.topic-sort button.active { background: var(--accent-soft); color: #e9eefb; }
.topic-sort button:hover:not(.active) { color: var(--text-2); }
.empty-ws-guide { padding: 36px 28px; max-width: 720px; margin: 0 auto; }
.empty-ws-guide h2 { font-size: 19px; color: var(--text); margin-bottom: 12px; }
.empty-ws-guide .lead { color: var(--text-2); font-size: 14px; line-height: 1.55; margin-bottom: 20px; }
.empty-ws-guide .cmd { display: block; padding: 14px 18px; background: var(--card); border-left: 3px solid var(--accent); border-radius: 4px; font: 13px/1.55 var(--mono); color: var(--text); margin: 14px 0; }
.empty-ws-guide .switch-ws { display: inline-block; margin-top: 12px; padding: 6px 14px; background: var(--bg-2); border: 1px solid var(--border-2); border-radius: 6px; color: var(--text-2); cursor: pointer; font-size: 12.5px; }
.empty-ws-guide .switch-ws:hover { border-color: var(--accent); color: #e9eefb; }
.search-layout { display: grid; grid-template-columns: 220px 1fr; gap: 24px; padding: 18px 28px; }
.search-facets { display: flex; flex-direction: column; gap: 18px; }
.search-facets h4 { font: 10px/1 var(--mono); color: var(--text-3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
.search-facets .facet-item { display: flex; justify-content: space-between; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 12.5px; color: var(--text-2); }
.search-facets .facet-item:hover { background: var(--card); color: var(--text); }
.search-facets .facet-item.active { background: var(--accent-soft); color: #e9eefb; }
.search-facets .facet-item .facet-count { font: 10px/1 var(--mono); color: var(--text-3); padding-top: 2px; }
.search-facets .facet-clear { display: inline-block; padding: 3px 8px; background: var(--bg); border: 1px solid var(--border-2); border-radius: 4px; color: var(--text-3); cursor: pointer; font: 10px/1 var(--mono); margin-top: 8px; }
.search-facets .facet-clear:hover { color: var(--text); border-color: var(--accent); }
.turn-row mark { background: rgba(107,139,214,0.4); color: #e9eefb; padding: 0 2px; border-radius: 2px; }
.turn-row.search-hit { animation: hit-flash 1.6s ease-out; }
.diary-card.search-hit { animation: hit-flash 1.6s ease-out; border-color: var(--accent); }
@keyframes hit-flash { 0% { box-shadow: 0 0 0 3px var(--accent); } 100% { box-shadow: none; } }
.capsule { flex-shrink: 0; height: 28px; padding: 0 14px; border-radius: 999px; border: 1px solid var(--border-2); background: transparent; color: var(--text-2); font-size: 12.5px; font-weight: 500; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: background 0.15s, border-color 0.15s; }
.capsule:hover { background: var(--card); color: var(--text); }
.capsule.active { border-color: var(--accent); background: var(--accent-soft); color: #e9eefb; font-weight: 600; }
.capsule .count { font: 10.5px/1 var(--mono); color: var(--text-3); }
.capsule.active .count { color: #e9eefb; opacity: 0.85; }

/* Sub-subjects row */
.subtopics-row { display: flex; align-items: center; gap: 6px; padding: 6px 28px; border-bottom: 1px solid var(--border); background: var(--bg); flex-wrap: wrap; row-gap: 6px; min-height: 36px; }
.subtopics-row .empty-sub { color: var(--text-3); font-size: 12px; padding: 0 4px; }
.subchip { flex-shrink: 0; height: 22px; padding: 0 10px; border-radius: 6px; color: var(--text-3); font-size: 12px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
.subchip::before { content: '└'; color: var(--text-3); margin-right: 2px; font-family: var(--mono); }
.subchip:hover { background: var(--card); color: var(--text-2); }
.subchip.active { background: var(--card); border: 1px solid var(--border-2); color: var(--text); }
.subchip .count { font: 10.5px/1 var(--mono); opacity: 0.7; }

/* Body grid */
.body { display: grid; grid-template-columns: 320px 1fr 360px; overflow: hidden; }

/* Sidebar */
.sidebar {
  background: var(--bg-2); border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 24px 18px 22px 24px;
}
.sidebar h3 {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-2);
  margin: 0 0 14px;
  font-weight: 700;
}
.sidebar > * + h3 { margin-top: 24px; }
.sidebar .controls { display: flex; gap: 4px; margin-bottom: 16px; }
.sidebar .controls button {
  flex: 1; font-size: 11.5px; padding: 5px 10px;
  background: var(--surface-2); border: 1px solid var(--border-2); border-radius: 5px;
  color: var(--text-2); cursor: pointer;
  transition: background 0.15s, border-color 0.15s, color 0.15s;
}
.sidebar .controls button.active { background: var(--accent-soft); border-color: var(--accent); color: #e9eefb; }
.sidebar .controls button:hover:not(.active) { background: var(--surface-3); border-color: var(--accent); color: var(--text); }
.tree-month {
  display: flex; align-items: center; justify-content: space-between;
  padding: 7px 8px; cursor: pointer; user-select: none; border-radius: 5px;
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
}
.tree-month:hover { background: var(--card); }
.tree-month .caret {
  color: var(--text-3);
  font-size: 11px;
  margin-right: 8px;
  display: inline-block;
  width: 10px;
}
.tree-month .label { flex: 1; }
.tree-children {
  display: block; margin: 4px 0 10px;
  padding-left: 14px;
  border-left: 1px solid var(--border);
  margin-left: 9px;
}
.tree-month.closed + .tree-children { display: none; }
.tree-day {
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 10px 6px 8px;
  cursor: pointer; user-select: none; border-radius: 5px;
  color: var(--text-2);
  font-size: 13px;
}
.tree-day:hover { background: var(--card); color: var(--text); }
.tree-day.active { background: var(--accent-soft); color: #e9eefb; }
.tree-day .label { display: flex; align-items: center; gap: 10px; }
.tree-day .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border-2); }
.tree-day.active .dot { background: var(--accent); }
.tree-count { font: 11px/1 var(--mono); color: var(--text-3); }
.tree-day.active .tree-count { color: #e9eefb; opacity: 0.85; }

/* Center pane */
.center { display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }
.chat-head { padding: 18px 36px 14px; border-bottom: 1px solid var(--border); background: var(--bg); }
.chat-head h1 { font-size: 17px; font-weight: 700; margin-bottom: 6px; color: var(--text); display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.chat-head .tag { display: inline-block; font-size: 11px; padding: 2px 8px; background: var(--card); border: 1px solid var(--border-2); border-radius: 4px; color: var(--text-2); font-weight: 500; }
.chat-head .meta { font: 12px/1.5 var(--mono); color: var(--text-3); letter-spacing: 0.02em; }
.chat-body { flex: 1; overflow-y: auto; padding: 20px 36px 40px; }
.empty { text-align: center; color: var(--text-3); padding: 80px 20px; font-size: 14px; }
.turn-row { display: flex; margin-bottom: 16px; align-items: flex-end; gap: 6px; }
.turn-row.user { justify-content: flex-end; }
.turn-row.assistant { justify-content: flex-start; }
.turn-row.system, .turn-row.tool { justify-content: flex-start; opacity: 1; }
/* 같은 화자 연속 발화는 간격 축소 */
.turn-row.same-speaker { margin-top: -10px; }
.bubble {
  max-width: 78%; padding: 12px 16px; border-radius: 14px;
  font-size: var(--font-body-1);          /* 15px */
  line-height: var(--line-body);          /* 1.65 */
  word-break: break-word;
}
.bubble.user { background: var(--user-bg); border: 1px solid var(--user-border); color: var(--user-text); border-top-right-radius: 4px; }
.bubble.assistant { background: var(--card-2); border: 1px solid var(--border); color: var(--text); border-top-left-radius: 4px; }
/* Tool-call turn — collapsible, mono, 좌측 thin border */
.bubble.system, .bubble.tool {
  background: var(--tool-bg);
  border: none;
  border-left: 2px solid var(--tool-border);
  border-radius: 0;
  padding: 4px 0 4px 12px;
  margin-left: 4px;
  color: var(--tool-text);
  font-family: var(--mono);
  font-size: 12.5px;
  font-style: normal;
  max-width: 84%;
}
.bubble.tool .tool-head, .bubble.system .tool-head {
  cursor: pointer; user-select: none;
  display: inline-flex; align-items: center; gap: 6px;
  color: var(--text-3);
}
.bubble.tool .tool-head::before,
.bubble.system .tool-head::before { content: '▸'; font-size: 9px; transition: transform 0.15s; display: inline-block; }
.bubble.tool.expanded .tool-head::before,
.bubble.system.expanded .tool-head::before { transform: rotate(90deg); }
.bubble.tool .tool-body, .bubble.system .tool-body { display: none; margin-top: 6px; white-space: pre-wrap; }
.bubble.tool.expanded .tool-body, .bubble.system.expanded .tool-body { display: block; }
.bubble code { font-family: var(--mono); font-size: 12.5px; background: var(--code-bg); color: var(--code-text); padding: 1px 6px; border-radius: 4px; }
.bubble pre { background: var(--code-bg); padding: 10px 12px; border-radius: 6px; overflow-x: auto; margin: 8px 0; }
.bubble pre code { background: transparent; padding: 0; }
.bubble p { margin: var(--paragraph-gap) 0; }
.bubble p:first-child { margin-top: 0; }
.bubble p:last-child { margin-bottom: 0; }
.bubble strong { color: #fff; }
.bubble.user strong { color: #f5f7ff; }
.bubble ul, .bubble ol { margin: 4px 0 4px 20px; }
.bubble blockquote { border-left: 3px solid var(--border-2); margin: 8px 0; padding-left: 12px; color: var(--text-2); }
.bubble table { border-collapse: collapse; margin: 8px 0; font-size: 12.5px; }
.bubble th, .bubble td { border: 1px solid var(--border-2); padding: 4px 8px; }
.ts { font: 10.5px/1 var(--mono); color: var(--text-3); padding-bottom: 4px; flex-shrink: 0; }
.load-more { text-align: center; padding: 14px; color: var(--accent); font-size: 12px; cursor: pointer; }
.load-more:hover { background: var(--card); }

/* Right panel */
.right { background: var(--bg-2); border-left: 1px solid var(--border); overflow-y: auto; padding: 22px 22px 18px; display: flex; flex-direction: column; }
.right h3 { font-size: 12px; font-weight: 700; color: var(--text); margin-bottom: 12px; display: flex; justify-content: space-between; align-items: baseline; text-transform: uppercase; letter-spacing: 0.05em; }
.right h3 .count { font: 11px/1 var(--mono); color: var(--text-3); font-weight: 500; text-transform: none; }
.right .section { margin-bottom: 28px; }
.keywords { display: flex; flex-wrap: wrap; gap: 6px 6px; }
.tag-chip {
  height: 26px; padding: 0 10px 0 11px;
  border-radius: 999px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  color: var(--text-2);
  font-size: 12px;
  display: inline-flex; align-items: center; gap: 6px;
  max-width: 220px;
  cursor: pointer;
  transition: background 0.12s, border-color 0.12s, color 0.12s;
}
.tag-chip:hover { background: var(--card); border-color: var(--accent); color: var(--text); }
.tag-chip .kw-name {
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  max-width: 160px;
}
.tag-chip .kw-count {
  font: 10.5px/1 var(--mono);
  color: var(--text-3);
  padding: 2px 6px;
  background: var(--bg);
  border-radius: 999px;
}
.tag-chip.hot { background: var(--accent-soft); border-color: var(--accent); color: #e9eefb; }
.tag-chip.hot .kw-count { color: #e9eefb; background: rgba(0,0,0,0.25); }
.tag-chip.is-hidden { display: none; }
.keywords-more {
  appearance: none; font-family: inherit;
  background: transparent; border: 1px dashed var(--border-2); border-radius: 999px;
  padding: 0 12px; font: 11px/1 var(--mono); color: var(--text-3); cursor: pointer;
  height: 26px; display: inline-flex; align-items: center; gap: 4px;
}
.keywords-more:hover { border-color: var(--accent); color: var(--text-2); border-style: solid; }
.summary-card { padding: 12px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 10px; font-size: 13px; line-height: 1.7; color: var(--text-2); overflow: hidden; }
.summary-card .meta { font: 11px/1.4 var(--mono); color: var(--text-3); margin-bottom: 6px; overflow-wrap: anywhere; }
.summary-card .content { white-space: pre-wrap; overflow-wrap: anywhere; word-break: break-word; }
.summary-card .content p { margin: 0 0 8px; }
.summary-card .content :last-child { margin-bottom: 0; }
.right .empty-mini { color: var(--text-3); font-size: 12px; padding: 8px 0 16px; }

/* Search results */
.search-results { padding: 24px 36px 40px; overflow-y: auto; flex: 1; }
.search-results h2 { font-size: 13px; color: var(--text-3); text-transform: uppercase; margin-bottom: 14px; letter-spacing: 0.08em; }
.search-result { padding: 14px 16px; border: 1px solid var(--border); background: var(--card); border-radius: 8px; margin-bottom: 10px; cursor: pointer; transition: border-color 0.15s; }
.search-result:hover { border-color: var(--accent); }
.search-result h4 { font-size: 14px; font-weight: 600; margin-bottom: 4px; color: var(--text); }
.search-result .meta { font: 11px/1.4 var(--mono); color: var(--text-3); margin-bottom: 8px; }
.search-result .snippet { font-size: 12.5px; color: var(--text-2); line-height: 1.55; max-height: 5em; overflow: hidden; }
.search-result mark { background: var(--accent-soft); color: #e9eefb; padding: 0 2px; border-radius: 2px; }

/* Entity (wiki) modal */
.modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 200; display: none; }
.modal-backdrop.open { display: flex; align-items: stretch; justify-content: center; }
.entity-modal { background: var(--bg-2); border: 1px solid var(--border-2); width: min(880px, calc(100vw - 80px)); margin: 40px 0; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; max-height: calc(100vh - 80px); box-shadow: 0 20px 60px rgba(0,0,0,0.6); }
.entity-modal header { padding: 20px 26px 14px; border-bottom: 1px solid var(--border); }
.entity-modal .crumb { font: 11px/1 var(--mono); color: var(--text-3); margin-bottom: 8px; }
.entity-modal .crumb a { color: var(--text-3); cursor: pointer; }
.entity-modal .crumb a:hover { color: var(--accent); }
.entity-modal h2 { font-size: 22px; color: var(--text); margin: 0 0 4px; font-weight: 700; }
.entity-modal .ent-meta { font: 11px/1 var(--mono); color: var(--text-3); }
.entity-modal .close-x { position: absolute; top: 16px; right: 22px; cursor: pointer; color: var(--text-3); font-size: 22px; background: transparent; border: 0; }
.entity-modal .close-x:hover { color: var(--text); }
.entity-modal .ent-filter-btn { margin-top: 10px; padding: 6px 12px; background: var(--accent-soft); color: var(--accent); border: 1px solid var(--accent); border-radius: 6px; font-size: 12px; cursor: pointer; }
.entity-modal .ent-filter-btn:hover { background: var(--accent); color: #fff; }
.entity-modal .body { padding: 16px 26px 24px; overflow-y: auto; }
.entity-modal .ent-body { padding: 18px 26px 26px; overflow-y: auto; }
.entity-modal .sec { margin-bottom: 22px; }
.entity-modal .sec h3 { font: 11px/1 var(--mono); color: var(--text-3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; font-weight: 700; }
.entity-modal .chips { display: flex; flex-wrap: wrap; gap: 6px; }
.wiki-chip { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; background: var(--card); border: 1px solid var(--border-2); border-radius: 14px; font-size: 12px; color: var(--text-2); cursor: pointer; }
.wiki-chip:hover { border-color: var(--accent); color: #e9eefb; background: var(--accent-soft); }
.wiki-chip .rt { font: 10px/1 var(--mono); color: var(--text-3); }
.wiki-chip.dir-in::before { content: '← '; color: var(--text-3); font-family: var(--mono); }
.wiki-chip.dir-out::before { content: '→ '; color: var(--text-3); font-family: var(--mono); }
.fact-row { display: grid; grid-template-columns: 130px 1fr auto; gap: 10px; padding: 8px 0; border-bottom: 1px dashed var(--border); font-size: 13px; }
.fact-row:last-child { border-bottom: 0; }
.fact-row .pred { font: 11px/1.4 var(--mono); color: var(--accent); padding-top: 2px; }
.fact-row .obj { color: var(--text); line-height: 1.45; }
.fact-row .obj .quote { display: block; color: var(--text-3); font-style: italic; font-size: 11.5px; margin-top: 4px; }
.fact-row .meta { font: 10px/1.3 var(--mono); color: var(--text-3); text-align: right; white-space: nowrap; }
.fact-row.superseded { opacity: 0.5; }
.fact-row.superseded .pred::after { content: ' [outdated]'; color: var(--text-3); }
.ep-row { padding: 8px 0; border-bottom: 1px dashed var(--border); cursor: pointer; display: flex; gap: 12px; }
.ep-row:hover { background: var(--card); }
.ep-row .ep-date { font: 11px/1 var(--mono); color: var(--text-3); padding-top: 3px; min-width: 92px; }
.ep-row .ep-sum { color: var(--text); line-height: 1.45; font-size: 13px; flex: 1; min-width: 0; overflow-wrap: anywhere; word-break: break-word; }
.ep-row .ep-ct { font: 10px/1 var(--mono); color: var(--text-3); padding-top: 3px; }

/* Heatmap (GitHub contribution style — sidebar + month-zoom inline) */
.heatmap-wrap { margin-bottom: 18px; padding: 12px 10px 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; }
.heatmap-wrap h4 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-2); margin-bottom: 8px; display: flex; justify-content: space-between; align-items: baseline; font-weight: 700; }
.heatmap-wrap h4 .range { font: 10.5px/1 var(--mono); color: var(--text-3); text-transform: none; letter-spacing: 0; opacity: 0.85; }
.heatmap-grid { display: flex; flex-direction: column; align-items: flex-start; gap: 4px; }
.heatmap-row { display: flex; gap: 4px; align-items: flex-start; }
.heatmap-axis-corner { width: 14px; height: 14px; flex: 0 0 14px; }
.heatmap-axis-x { display: block; font: 10px/1 var(--mono); color: var(--text-3); position: relative; height: 14px; flex: 0 0 auto; }
.heatmap-axis-x .month-label { position: absolute; top: 2px; white-space: nowrap; letter-spacing: 0.02em; }
.heatmap-axis-y { display: flex; flex-direction: column; gap: 2px; font: 10px/13px var(--mono); color: var(--text-3); text-align: right; padding-right: 2px; width: 14px; flex: 0 0 14px; }
.heatmap-axis-y span { display: block; height: 13px; line-height: 13px; }
.heatmap { display: flex; gap: 2px; flex: 0 0 auto; }
.heatmap .week { display: flex; flex-direction: column; gap: 2px; flex: 0 0 auto; }
.heatmap .day { width: 13px; height: 13px; border-radius: 2px; background: var(--card); cursor: pointer; transition: outline 0.1s; border: 1px solid transparent; box-sizing: border-box; }
.heatmap .day.empty { background: var(--card); cursor: default; border: 1px solid var(--border); padding: 0; text-align: left; color: inherit; font-size: inherit; }
.heatmap .day.empty.future { opacity: 0.3; border-style: dashed; }
.heatmap .day.l1 { background: rgba(107,139,214,0.4); border-color: transparent; }
.heatmap .day.l2 { background: rgba(107,139,214,0.65); border-color: transparent; }
.heatmap .day.l3 { background: rgba(107,139,214,0.85); border-color: transparent; }
.heatmap .day.l4 { background: var(--accent); border-color: transparent; }
.heatmap .day.active { outline: 1px solid var(--text); outline-offset: 1px; }
.heatmap .day:not(.empty):hover { outline: 1px solid var(--accent); outline-offset: 1px; }
.heatmap-legend { display: flex; align-items: center; gap: 4px; font: 10.5px/1 var(--mono); color: var(--text-3); margin-top: 8px; justify-content: flex-end; }
.heatmap-legend .day { width: 11px; height: 11px; border-radius: 2px; cursor: default; box-sizing: border-box; }
.heatmap-legend .day.l1 { background: rgba(107,139,214,0.4); }
.heatmap-legend .day.l2 { background: rgba(107,139,214,0.65); }
.heatmap-legend .day.l3 { background: rgba(107,139,214,0.85); }
.heatmap-legend .day.l4 { background: var(--accent); }

/* Inline mini-heatmap inside month-zoom tree-children */
.tree-children .heatmap-mini { padding: 8px 4px 6px; display: flex; gap: 2px; justify-content: center; }
.tree-children .heatmap-mini .week { display: flex; flex-direction: column; gap: 2px; }
.tree-children .heatmap-mini .day { width: 10px; height: 10px; border-radius: 2px; background: var(--card); cursor: pointer; box-sizing: border-box; padding: 0; }
.tree-children .heatmap-mini .day.empty { cursor: default; opacity: 0.4; padding: 0; text-align: left; color: inherit; font-size: inherit; }
.tree-children .heatmap-mini .day.l1 { background: rgba(107,139,214,0.25); }
.tree-children .heatmap-mini .day.l2 { background: rgba(107,139,214,0.5); }

/* Wiki tab button (header) — cleaned-toggle/ws-label과 동일 톤 */
.wiki-tab {
  font: var(--font-meta)/1 var(--mono);
  color: var(--text-3);
  padding: 5px 11px;
  border-radius: 6px;
  cursor: pointer;

}
.wiki-tab::before { content: '⬢'; opacity: 0.6; font-size: 10px; }
.wiki-tab:hover { color: var(--text); background: var(--card); border-color: var(--border-strong); }
.wiki-tab.active { color: #e9eefb; background: var(--accent-soft); border-color: var(--accent); }

/* Wiki index modal (reuses entity-modal patterns) */
.wiki-modal { background: var(--bg-2); border: 1px solid var(--border-2); width: min(1000px, calc(100vw - 80px)); margin: 40px 0; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; max-height: calc(100vh - 80px); box-shadow: 0 20px 60px rgba(0,0,0,0.6); }
.wiki-modal header { padding: 20px 26px 14px; border-bottom: 1px solid var(--border); position: relative; }
.wiki-modal header h2 { font-size: 20px; color: var(--text); margin: 0 0 4px; font-weight: 700; }
.wiki-modal header .ent-meta { font: 11px/1 var(--mono); color: var(--text-3); }
.wiki-modal .close-x { position: absolute; top: 16px; right: 22px; cursor: pointer; color: var(--text-3); font-size: 22px; background: transparent; border: 0; }
.wiki-modal .close-x:hover { color: var(--text); }
.wiki-modal .wiki-body { padding: 16px 26px 24px; overflow-y: auto; }
.wiki-group { margin-bottom: 26px; }
.wiki-group h3 { font: 11px/1 var(--mono); color: var(--accent); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; font-weight: 700; display: flex; justify-content: space-between; align-items: baseline; }
.wiki-group h3 .count { color: var(--text-3); font-weight: 500; }
.wiki-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 6px; }
.wiki-entry { padding: 8px 10px; background: var(--card); border: 1px solid var(--border-2); border-radius: 6px; cursor: pointer; transition: border-color 0.15s, background 0.15s; display: flex; flex-direction: column; gap: 4px; }
.wiki-entry:hover { border-color: var(--accent); background: var(--accent-soft); }
.wiki-entry .name { font-size: 13px; color: var(--text); font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* Wiki — view-mode toggle (List | Graph) */
.wiki-mode-toggle { display: inline-flex; gap: 0; margin-top: 10px; border: 1px solid var(--border-2); border-radius: 6px; overflow: hidden; }
.wiki-mode-toggle button { background: var(--bg); color: var(--text-3); border: 0; padding: 5px 12px; font: 11.5px/1 var(--mono); cursor: pointer; transition: background 0.15s, color 0.15s; }
.wiki-mode-toggle button + button { border-left: 1px solid var(--border-2); }
.wiki-mode-toggle button:hover { color: var(--text); background: var(--card); }
.wiki-mode-toggle button.active { color: #e9eefb; background: var(--accent-soft); }

/* D3 force-directed graph view */
.graph-view { width: 100%; height: 600px; border: 1px solid var(--border); background: var(--bg); border-radius: 8px; position: relative; overflow: hidden; }
.graph-view svg { width: 100%; height: 100%; display: block; cursor: grab; }
.graph-view svg:active { cursor: grabbing; }
.graph-node { cursor: pointer; }
.graph-node circle { stroke: var(--border-strong); stroke-width: 1.5; transition: stroke 0.15s; }
.graph-node:hover circle { stroke: var(--accent); stroke-width: 2.5; }
.graph-node text { font-size: 11px; fill: var(--text); pointer-events: none; font-family: var(--mono); }
.graph-link { stroke-opacity: 0.6; fill: none; }
.graph-link.part_of { stroke: #6b8bd6; }
.graph-link.depends_on { stroke: #d68b6b; }
.graph-link.supports { stroke: #6bd68b; }
.graph-link.contradicts { stroke: #d66b8b; stroke-dasharray: 4,2; }
.graph-link.related_to { stroke: var(--text-3); }
.graph-controls { padding: 8px 4px; display: flex; gap: 12px; align-items: center; font: 11px/1 var(--mono); color: var(--text-3); }
.graph-controls .legend { display: inline-flex; align-items: center; gap: 4px; }
.graph-controls .legend .swatch { display: inline-block; width: 10px; height: 10px; border-radius: 50%; }
.graph-empty { color: var(--text-3); font-size: 12.5px; padding: 24px 0; text-align: center; }

/* Diary-first view */
.diary-list { display: flex; flex-direction: column; gap: 28px; padding: 8px 4px 80px; }
.diary-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 22px 26px 18px; }
.diary-card .diary-head { display: flex; gap: 14px; align-items: baseline; margin-bottom: 8px; font: 11.5px/1.2 var(--mono); color: var(--text-3); }
.diary-card .diary-time { font-weight: 700; color: var(--text); font-size: 13px; }
.diary-card .diary-meta { color: var(--text-3); }
.diary-card .diary-title { font-size: 14.5px; font-weight: 700; color: var(--text); margin: 4px 0 10px; letter-spacing: -0.01em; }
.diary-card .diary-placeholder { background: rgba(255, 200, 100, 0.08); border: 1px solid rgba(255, 200, 100, 0.25); color: #d9b06a; padding: 6px 10px; border-radius: 6px; font-size: 12px; margin: 6px 0 10px; }
.diary-card .diary-body { font: 15px/1.72 var(--sans); color: var(--text); white-space: pre-wrap; word-break: keep-all; }
.diary-card .diary-body p { margin: 0 0 12px; }
.diary-card .diary-body h1, .diary-card .diary-body h2, .diary-card .diary-body h3 { margin: 14px 0 6px; }

.diary-card .show-turns-btn { background: var(--bg-2); border: 1px solid var(--border-2); color: var(--text-2); padding: 7px 14px; border-radius: 8px; font: 12px/1 var(--sans); cursor: pointer; transition: all 0.15s; }
.diary-card .show-turns-btn:hover { background: var(--border-2); color: var(--text); }
.diary-turns-slot { margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--border); }
.chat-head .chat-title { display: flex; gap: 12px; align-items: baseline; flex-wrap: wrap; }
.chat-head .ct-main { font-size: 18px; font-weight: 700; color: var(--text); }
.chat-head .ct-hint { font: 11.5px/1.4 var(--sans); color: var(--text-3); flex-basis: 100%; margin-top: 6px; }

/* Scrollbar */
.sidebar::-webkit-scrollbar, .chat-body::-webkit-scrollbar, .right::-webkit-scrollbar, .search-results::-webkit-scrollbar { width: 8px; }
.sidebar::-webkit-scrollbar-thumb, .chat-body::-webkit-scrollbar-thumb, .right::-webkit-scrollbar-thumb, .search-results::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 4px; }
