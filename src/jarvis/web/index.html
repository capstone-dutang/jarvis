<div class="modal-backdrop" id="entity-modal"></div>

<script>
const API = '/api/v1/memory';
let WORKSPACE_ID = null;
let WORKSPACE_NAME = null;
const state = {
  topics: [],          // [{subject_id, name, turn_count}]
  subTree: null,       // SubjectTreeResponse
  subjectsMap: {},     // {subject_id: {name, parent_id, turn_count}}
  cleanedView: true,   // 도구 호출 줄 hide
  entityStack: [],     // wikilink 네비게이션 히스토리 (entity_id 배열)
  topicSortMode: 'activity',  // 'activity' | 'recent' | 'name'
  searchQuery: '',
  searchResultsRaw: [],
  searchFacets: { yearMonth: null, subjectId: null, matchedField: null },
  searchJumpTerm: null,  // 검색 후 다음 refreshBody에서 하이라이트할 단어
  selectedTopicId: null,
  selectedSubId: null,
  selectedDate: null,  // YYYY-MM-DD
  zoom: 'day',
  descending: true,
  dateBuckets: { months: {} },
  monthOpen: {},
  searchActive: false,
  workspaces: [],      // [{id, name, ep_count?}]
  turnsLimit: 1000,    // current load limit for body
  totalTurns: 0,       // last server-reported total
  hasMore: false,      // last server-reported has_more
  brief: null,         // Today's Brief payload (BriefResponse) — null when fetch fails
  briefMode: 'cross',  // 'cross' (전체 ws) | 'deep' (현재 ws)
  wikiViewMode: 'list', // 'list' | 'graph' — Stage 2C wiki tab view toggle
  graphData: null,     // last /graph response (cached per modal open)
};

// ── Utilities ──
function $(id) { return document.getElementById(id); }
async function post(path, body) {
  const res = await fetch(API + path, {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body),
  });
  if (!res.ok) throw new Error(`${path} ${res.status}: ${await res.text()}`);
  return res.json();
}
function fmtKST(iso) {
  const d = new Date(iso);
  const dd = String(d.getDate()).padStart(2,'0');
  const hh = String(d.getHours()).padStart(2,'0');
  const mm = String(d.getMinutes()).padStart(2,'0');
  return `${dd}일 ${hh}:${mm}`;
}
function fmtTime(iso) {
  const d = new Date(iso);
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function nextDay(d) {
  const dt = new Date(d + 'T00:00:00Z');
  dt.setUTCDate(dt.getUTCDate() + 1);
  return dt.toISOString().slice(0,10);
}
function dateKey(iso) {
  return iso.slice(0,10);
}
function weekdayKR(iso) {
  const days = ['일','월','화','수','목','금','토'];
  return days[new Date(iso).getDay()] + '요일';
}

// ── Workspace ──
async function pickWorkspace() {
  const res = await fetch('/api/v1/workspaces');
  const list = await res.json();
  state.workspaces = list;
  const target = list.find(w => w.name === '자비스 캡스톤 프로젝트')
              || list.find(w => w.name === '자비스프로젝트')
              || list.find(w => w.name === 'ai-argos')
              || list[0];
  WORKSPACE_ID = target.id;
  WORKSPACE_NAME = target.name;
  setWsLabel(target.name);
}

function renderWsMenu() {
  const menu = $('ws-menu');
  const featured = ['자비스 캡스톤 프로젝트', '자비스프로젝트', 'ai-argos'];
  const sorted = [...state.workspaces].sort((a, b) => {
    const ai = featured.indexOf(a.name), bi = featured.indexOf(b.name);
    if (ai !== -1 || bi !== -1) {
      if (ai === -1) return 1;
      if (bi === -1) return -1;
      return ai - bi;
    }
    return a.name.localeCompare(b.name);
  });
  menu.innerHTML = sorted.map(w => `
    <div class="ws-menu-item${w.id === WORKSPACE_ID ? ' active' : ''}" data-ws-id="${w.id}" data-ws-name="${escapeHtml(w.name)}">
      <span>${escapeHtml(w.name)}</span>
      <span class="ep-count">${w.id === WORKSPACE_ID ? '✓' : ''}</span>
    </div>
  `).join('');
  for (const el of menu.querySelectorAll('.ws-menu-item')) {
    el.onclick = async () => {
      const id = el.getAttribute('data-ws-id');
      const name = el.getAttribute('data-ws-name');
      if (id === WORKSPACE_ID) { menu.classList.remove('open'); return; }
      WORKSPACE_ID = id;
      WORKSPACE_NAME = name;
      setWsLabel(name);
      menu.classList.remove('open');
      // Reset selection + reload
      state.selectedTopicId = null;
      state.selectedSubId = null;
      state.selectedDate = null;
      state.subTree = null;
      state.subjectsMap = {};
      state.searchActive = false;
      state.onThisDay = null;
      state.wikiIndex = null;
      state.brief = null;
      restoreLayout();
      await Promise.all([loadTopics(), loadDateTree(), loadSubTree(), loadDashboard(), loadLedger(), loadOnThisDay(), loadBrief()]);
      await refreshBody();
    };
  }
}

// ── Topics (top-level subjects) ──
async function loadTopics() {
  const r = await post('/subjects', { workspace_id: WORKSPACE_ID, top_level_only: true });
  state.topics = r.subjects;
  renderTopics();
}
function sortedTopics() {
  const arr = state.topics.slice();
  if (state.topicSortMode === 'name') {
    arr.sort((a,b) => a.name.localeCompare(b.name, 'ko'));
  } else if (state.topicSortMode === 'recent') {
    // recent: latest_episode_at desc → fallback to turn_count if absent
    arr.sort((a,b) => {
      const at = a.latest_episode_at || '';
      const bt = b.latest_episode_at || '';
      if (at !== bt) return bt.localeCompare(at);
      return b.turn_count - a.turn_count;
    });
  } else {
    arr.sort((a,b) => b.turn_count - a.turn_count);
  }
  return arr;
}
function renderTopics() {
  const row = $('topics-row');
  row.innerHTML = '';
  if (state.topics.length === 0) {
    row.innerHTML = '<span style="color:var(--text-3);font-size:12px;">분류된 주제 없음</span>';
    return;
  }
  // "전체" pseudo-tab — count는 워크스페이스 실제 turn 수(dashboard stats).
  // (subjects.turn_count 합은 turn이 여러 주제에 중복 매핑돼 부풀려지므로 쓰지 않음)
  const all = document.createElement('div');
  all.className = 'capsule' + (state.selectedTopicId === null ? ' active' : '');
  const wsTotal = state.dashboard?.stats?.total_turns;
  all.innerHTML = `<span>전체</span>` + (wsTotal ? `<span class="count">${wsTotal.toLocaleString()}</span>` : '');
  all.onclick = () => selectTopic(null);
  row.appendChild(all);
  // 상위 N개만 노출 + 더보기 (주제가 수십 개라 화면을 덮는 문제 방지)
  const VISIBLE_TOPICS = 12;
  const topics = sortedTopics();
  topics.forEach((t, i) => {
    const cap = document.createElement('div');
    cap.className = 'capsule'
      + (state.selectedTopicId === t.subject_id ? ' active' : '')
      + (i >= VISIBLE_TOPICS ? ' topic-hidden' : '');
    cap.innerHTML = `<span>${escapeHtml(t.name)}</span><span class="count">${t.turn_count.toLocaleString()}</span>`;
    cap.onclick = () => selectTopic(t.subject_id);
    row.appendChild(cap);
  });
  if (topics.length > VISIBLE_TOPICS) {
    const moreBtn = document.createElement('button');
    moreBtn.className = 'topics-more';
    moreBtn.dataset.expanded = '0';
    moreBtn.textContent = `+ ${topics.length - VISIBLE_TOPICS}개`;
    moreBtn.onclick = (e) => {
      e.stopPropagation();
      const expanded = moreBtn.dataset.expanded === '1';
      for (const el of row.querySelectorAll('.topic-hidden')) {
        el.style.display = expanded ? 'none' : '';
      }
      moreBtn.dataset.expanded = expanded ? '0' : '1';
      moreBtn.textContent = expanded ? `+ ${topics.length - VISIBLE_TOPICS}개` : '접기';
    };
    row.appendChild(moreBtn);
  }
  // Sort toggle (활성도/최근/이름)
  const sortBox = document.createElement('div');
  sortBox.className = 'topic-sort';
  const modes = [['activity', '활성'], ['recent', '최근'], ['name', '이름']];
  for (const [m, label] of modes) {
    const btn = document.createElement('button');
    btn.textContent = label;
    if (state.topicSortMode === m) btn.classList.add('active');
    btn.onclick = (e) => { e.stopPropagation(); state.topicSortMode = m; renderTopics(); };
    sortBox.appendChild(btn);
  }
  row.appendChild(sortBox);
}

// ── Sub-subjects ──
async function loadSubTree() {
  if (state.subTree) return;
  state.subTree = await post('/subject-tree', { workspace_id: WORKSPACE_ID });
  // Flatten into subjectsMap
  const walk = (nodes, parentId) => {
    for (const n of nodes) {
      state.subjectsMap[n.subject_id] = {
        name: n.name,
        parent_id: parentId,
        turn_count: n.turn_count,
        // entity_type 은 백엔드 /subject-tree 응답에 있을 수도 없을 수도 — 옵셔널.
        // F3: episode_topic 자동 분해 결과는 색인 chip 에서 제외 (아래 필터에서 사용).
        entity_type: n.entity_type || null,
      };
      if (n.children) walk(n.children, n.subject_id);
    }
  };
  walk(state.subTree.roots, null);
}
function findNode(roots, id) {
  for (const r of roots) {
    if (r.subject_id === id) return r;
    const f = findNode(r.children, id);
    if (f) return f;
  }
  return null;
}
function renderSubtopics() {
  const row = $('subtopics-row');
  row.innerHTML = '';
  if (!state.selectedTopicId) {
    row.innerHTML = '<span class="empty-sub">주제를 선택하면 하위가 표시됩니다</span>';
    return;
  }
  if (!state.subTree) return;
  const node = findNode(state.subTree.roots, state.selectedTopicId);
  if (!node || node.children.length === 0) {
    row.innerHTML = '<span class="empty-sub">하위 주제 없음</span>';
    return;
  }
  const sorted = [...node.children].sort((a,b) => b.turn_count - a.turn_count);
  // "전체" sub
  const all = document.createElement('div');
  all.className = 'subchip' + (state.selectedSubId === null ? ' active' : '');
  all.innerHTML = `<span>전체</span><span class="count">${node.turn_count.toLocaleString()}</span>`;
  all.onclick = () => selectSub(null);
  row.appendChild(all);
  for (const c of sorted) {
    const chip = document.createElement('div');
    chip.className = 'subchip' + (state.selectedSubId === c.subject_id ? ' active' : '');
    // truncate label > 40 chars
    const label = c.name.length > 40 ? c.name.slice(0, 38) + '…' : c.name;
    chip.innerHTML = `<span>${escapeHtml(label)}</span><span class="count">${c.turn_count}</span>`;
    chip.title = c.name + ' — 클릭으로 위키 페이지';
    // F4: 우측 색인 chip 과 동작 통일 — 위키 모달 띄움.
    // 본문 필터 (selectSub) 는 모달 안 "본문 필터링" 버튼으로 옮김 (renderEntityModal).
    chip.onclick = () => openEntityPage(c.subject_id);
    row.appendChild(chip);
  }
}

// ── Date tree ──
async function loadDateTree() {
  // Light aggregation — server returns per-day count only, full history.
  const r = await post('/date-buckets', { workspace_id: WORKSPACE_ID });
  const months = {};
  for (const b of r.buckets) {
    const ym = b.date.slice(0, 7);
    if (!months[ym]) months[ym] = { count: 0, days: {} };
    months[ym].count += b.count;
    months[ym].days[b.date] = b.count;
  }
  state.dateBuckets = { months };
  // Default: open the latest month
  const latest = Object.keys(months).sort().pop();
  if (latest && state.monthOpen[latest] === undefined) state.monthOpen[latest] = true;
  renderDateTree();
  renderSidebarHeatmap();
}
function renderDateTree() {
  const tree = $('date-tree');
  tree.innerHTML = '';
  const months = Object.keys(state.dateBuckets.months).sort();
  if (state.descending) months.reverse();
  for (const ym of months) {
    const mb = state.dateBuckets.months[ym];
    const open = state.monthOpen[ym] === true;
    const mnode = document.createElement('div');
    mnode.className = 'tree-month' + (open ? '' : ' closed');
    mnode.innerHTML = `<span class="label"><span class="caret">${open ? '▼' : '▶'}</span>${ym}</span><span class="tree-count">${mb.count.toLocaleString()}</span>`;
    mnode.onclick = () => { state.monthOpen[ym] = !open; renderDateTree(); };
    tree.appendChild(mnode);
    const children = document.createElement('div');
    children.className = 'tree-children';
    if (!open) { tree.appendChild(children); continue; }
    if (state.zoom === 'month') {
      // P7 — month-zoom: replace per-day list with a mini calendar heatmap.
      // Lets the user see the month's rhythm without scrolling a 30-row list.
      children.appendChild(renderMonthMiniHeatmap(ym, mb.days));
      tree.appendChild(children);
      continue;
    }
    const days = Object.keys(mb.days).sort();
    if (state.descending) days.reverse();
    for (const d of days) {
      const dnode = document.createElement('div');
      dnode.className = 'tree-day' + (state.selectedDate === d ? ' active' : '');
      dnode.innerHTML = `<div class="label"><span class="dot"></span><span>${d.slice(8)} ${weekdayKR(d)}</span></div><span class="tree-count">${mb.days[d]}</span>`;
      dnode.onclick = (e) => { e.stopPropagation(); selectDate(d); };
      children.appendChild(dnode);
    }
    tree.appendChild(children);
  }
}

// ── Heatmap (GitHub contribution style) ──
// Maps an absolute count to a 0-4 level using fixed thresholds relative to
// the workspace max (so a sparse workspace doesn't render everything as l4).
function heatLevel(count, max) {
  if (!count) return 0;
  if (max <= 0) return 0;
  const ratio = count / max;
  if (ratio >= 0.75) return 4;
  if (ratio >= 0.45) return 3;
  if (ratio >= 0.2)  return 2;
  return 1;
}

// Compute global max-per-day across the whole workspace.
function workspaceMaxPerDay() {
  let max = 0;
  for (const ym of Object.keys(state.dateBuckets.months || {})) {
    const days = state.dateBuckets.months[ym].days || {};
    for (const d of Object.keys(days)) {
      if (days[d] > max) max = days[d];
    }
  }
  return max;
}

// Build a 12-week × 7-day heatmap covering the last ~84 days from today.
// Renders into the sidebar so the user has an immediate sense of activity
// rhythm without expanding the month tree.
function renderSidebarHeatmap() {
  const container = $('heatmap-container');
  if (!container) return;
  const max = workspaceMaxPerDay();
  // Flatten all date→count for O(1) lookup (safe even when max===0).
  const counts = {};
  for (const ym of Object.keys(state.dateBuckets.months || {})) {
    const days = state.dateBuckets.months[ym].days || {};
    for (const d of Object.keys(days)) counts[d] = days[d];
  }
  const WEEKS = 12;
  const DAYS = WEEKS * 7;
  // Anchor on today (server-local interpretation — uses browser clock; matches
  // user expectation of "right now"). Snap the end to today's Saturday so the
  // most-recent week column is complete; then walk back DAYS-1 to derive the
  // start (which will land on a Sunday by construction).
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const end = new Date(today);
  end.setDate(end.getDate() + (6 - end.getDay()));   // snap forward to Saturday
  const start = new Date(end);
  start.setDate(start.getDate() - (DAYS - 1));        // 84-day window ending Sat
  const cells = [];
  const cursor = new Date(start);
  for (let i = 0; i < DAYS; i++) {
    const yyyy = cursor.getFullYear();
    const mm = String(cursor.getMonth() + 1).padStart(2, '0');
    const dd = String(cursor.getDate()).padStart(2, '0');
    const key = `${yyyy}-${mm}-${dd}`;
    const future = cursor > today;
    cells.push({ key, count: counts[key] || 0, future, month: cursor.getMonth() + 1 });
    cursor.setDate(cursor.getDate() + 1);
  }
  // Group into weeks (columns, 7 rows each). Track first-cell month per week
  // for the x-axis label positioning.
  const weeksHtml = [];
  const weekMonths = [];        // month number of the top (Sunday) cell per column
  for (let w = 0; w < WEEKS; w++) {
    const wcells = [];
    weekMonths.push(cells[w * 7] ? cells[w * 7].month : null);
    for (let r = 0; r < 7; r++) {
      const cell = cells[w * 7 + r];
      if (!cell) continue;
      if (cell.future) {
        wcells.push(`<div class="day empty future" title="${cell.key} · (미래)"></div>`);
        continue;
      }
      const lvl = heatLevel(cell.count, max);
      const cls = `day l${lvl}${state.selectedDate === cell.key ? ' active' : ''}${cell.count === 0 ? ' empty' : ''}`;
      const title = `${cell.key} · ${cell.count} turns`;
      const attr = cell.count > 0 ? ` data-date="${cell.key}"` : '';
      wcells.push(`<div class="${cls}" title="${title}"${attr}></div>`);
    }
    weeksHtml.push(`<div class="week">${wcells.join('')}</div>`);
  }
  // Build x-axis month labels: place a label at the first week of each month
  // appearing in the window. Column width = 13px cell + 2px gap = 15px.
  const COL_W = 15;
  const xLabels = [];
  let prevMonth = null;
  for (let w = 0; w < WEEKS; w++) {
    const m = weekMonths[w];
    if (m && m !== prevMonth) {
      xLabels.push(`<span class="month-label" style="left:${w * COL_W}px">${m}월</span>`);
      prevMonth = m;
    }
  }
  const rangeLabel = `${cells[0].key.slice(5)} → ${cells[cells.length-1].key.slice(5)}`;
  container.innerHTML = `
    <div class="heatmap-wrap">
      <h4>활동 히트맵 <span class="range">${rangeLabel}</span></h4>
      <div class="heatmap-grid">
        <div class="heatmap-row">
          <div class="heatmap-axis-corner"></div>
          <div class="heatmap-axis-x">${xLabels.join('')}</div>
        </div>
        <div class="heatmap-row">
          <div class="heatmap-axis-y"><span></span><span>월</span><span></span><span>수</span><span></span><span>금</span><span></span></div>
          <div class="heatmap" id="sidebar-heatmap">${weeksHtml.join('')}</div>
        </div>
      </div>
      <div class="heatmap-legend">
        <span>적음</span>
        <span class="day l1"></span>
        <span class="day l2"></span>
        <span class="day l3"></span>
        <span class="day l4"></span>
        <span>많음</span>
      </div>
    </div>`;
  for (const el of container.querySelectorAll('.day[data-date]')) {
    el.onclick = () => selectDate(el.getAttribute('data-date'));
  }
}

// Mini calendar heatmap for a single month, rendered inline inside the
// month-zoom tree-children when the month is expanded but zoom='month'.
// 7×N grid where each cell is one day of that month.
function renderMonthMiniHeatmap(ym, daysMap) {
  const [year, month] = ym.split('-').map(Number);
  const max = Math.max(1, ...Object.values(daysMap || {}));
  // 1st of month → which weekday (0=Sun) does it land on
  const firstDow = new Date(Date.UTC(year, month - 1, 1)).getUTCDay();
  const daysInMonth = new Date(Date.UTC(year, month, 0)).getUTCDate();
  // Build a flat array of slots from the first Sunday of the visible grid.
  const slots = [];
  for (let i = 0; i < firstDow; i++) slots.push(null);
  for (let d = 1; d <= daysInMonth; d++) {
    const dd = String(d).padStart(2, '0');
    const mm = String(month).padStart(2, '0');
    const key = `${year}-${mm}-${dd}`;
    slots.push({ key, count: daysMap[key] || 0 });
  }
  while (slots.length % 7 !== 0) slots.push(null);
  const weeks = slots.length / 7;
  // Group columns (week=column, 7 days=rows). slots are filled row-major
  // (week-row), so column j contains slots[col=j*7+row].
  // Actually easier: re-group into 7 rows × N columns where row=DOW.
  const cols = [];
  for (let w = 0; w < weeks; w++) {
    const wcells = [];
    for (let r = 0; r < 7; r++) {
      const cell = slots[w * 7 + r];
      if (cell === null) {
        wcells.push(`<div class="day empty"></div>`);
        continue;
      }
      const lvl = heatLevel(cell.count, max);
      const cls = `day l${lvl}${state.selectedDate === cell.key ? ' active' : ''}${cell.count === 0 ? ' empty' : ''}`;
      const title = `${cell.key} · ${cell.count} turns`;
      const attr = cell.count > 0 ? ` data-date="${cell.key}"` : '';
      wcells.push(`<div class="${cls}" title="${title}"${attr}></div>`);
    }
    cols.push(`<div class="week">${wcells.join('')}</div>`);
  }
  const wrap = document.createElement('div');
  wrap.className = 'heatmap-mini';
  wrap.innerHTML = cols.join('');
  for (const el of wrap.querySelectorAll('.day[data-date]')) {
    el.onclick = (ev) => { ev.stopPropagation(); selectDate(el.getAttribute('data-date')); };
  }
  return wrap;
}

// ── Selection actions ──
async function selectTopic(id) {
  state.selectedTopicId = id;
  state.selectedSubId = null;
  state.searchActive = false;
  await loadSubTree();
  renderTopics();
  renderSubtopics();
  await refreshBody();
}
async function selectSub(id) {
  state.selectedSubId = id;
  state.searchActive = false;
  renderSubtopics();
  await refreshBody();
}
async function selectDate(d) {
  state.selectedDate = state.selectedDate === d ? null : d;
  state.searchActive = false;
  renderDateTree();
  renderSidebarHeatmap();
  await refreshBody();
}

// ── Body render ──
// Dashboard data cache — refreshed by loadDashboard().
state.dashboard = null;
state.ledger = null; // P4 — ingest_ledger summary (latest N + local diff)
state.onThisDay = null; // P7 — dedicated /on-this-day endpoint (year + days_ago)
state.wikiIndex = null; // P7 — cached entity-index payload

async function loadDashboard() {
  if (!WORKSPACE_ID) return;
  const pill = $('stats-pill');
  pill.classList.add('loading');
  let data;
  try {
    data = await post('/dashboard', { workspace_id: WORKSPACE_ID });
  } catch (e) {
    pill.textContent = '통계 로드 실패';
    pill.classList.remove('loading');
    state.dashboard = null;
    return;
  }
  state.dashboard = data;
  renderStatsPill(data.stats);
}

async function loadLedger({ includeLocalDiff = true, limit = 12 } = {}) {
  if (!WORKSPACE_ID) return null;
  try {
    const data = await post('/ingest-ledger', {
      workspace_id: WORKSPACE_ID,
      include_local_diff: includeLocalDiff,
      limit,
    });
    state.ledger = data;
    return data;
  } catch (e) {
    state.ledger = null;
    return null;
  }
}

// P7 — fetch /on-this-day fresh on home render; small payload, no caching.
async function loadOnThisDay() {
  if (!WORKSPACE_ID) { state.onThisDay = null; return null; }
  try {
    const data = await post('/on-this-day', { workspace_id: WORKSPACE_ID, limit: 10 });
    state.onThisDay = data;
    return data;
  } catch (e) {
    state.onThisDay = null;
    return null;
  }
}

// Today's Brief — cross-ws (workspace 미지정) 또는 현재 ws deep.
// 백엔드 /brief endpoint 가 아직 안 떠 있어도 카드 자체는 fallback 으로 표시.
async function loadBrief() {
  if (!WORKSPACE_ID) { state.brief = null; return null; }
  const body = state.briefMode === 'deep'
    ? { workspace_id: WORKSPACE_ID, detail: 'brief' }
    : {};
  try {
    const data = await post('/brief', body);
    state.brief = data;
    return data;
  } catch (e) {
    // endpoint 가 없거나 실패 — 카드는 fallback 메시지로 그려짐
    state.brief = null;
    console.warn('brief load failed', e.message || e);
    return null;
  }
}

function renderStatsPill(s) {
  const pill = $('stats-pill');
  if (!s) {
    pill.textContent = '…';
    return;
  }
  const range = (s.first_date && s.last_date) ? `${s.first_date}~${s.last_date}` : '데이터 없음';
  pill.classList.remove('loading');
  pill.innerHTML = `
    <span class="live"></span>
    <span><span class="num">${(s.episode_count || 0).toLocaleString()}</span> <span class="unit">일기</span></span>
    <span class="sep">·</span>
    <span><span class="num">${(s.turn_count || 0).toLocaleString()}</span> <span class="unit">turn</span></span>
    <span class="sep">·</span>
    <span class="range">${escapeHtml(range)}</span>
  `;
}

// Today's Brief — Home grid 첫 행 (span-2).
// 3섹션 적층: 활성 ws / 최근 thread / 다음 추천.
// 백엔드 /brief 가 비어있거나 실패해도 카드 자체는 항상 그려진다 (fallback).
function renderBriefCard() {
  const b = state.brief;
  const modeLabel = state.briefMode === 'deep' ? 'deep · 현재 ws' : 'cross · 활성 합계';
  const modeBadgeText = state.briefMode === 'deep'
    ? `${WORKSPACE_NAME || '현재 ws'}만`
    : '전체 워크스페이스';
  const modeBadgeHtml = `<span class="brief-mode-badge">${escapeHtml(modeBadgeText)}</span>`;

  // Fallback: 백엔드 endpoint 없거나 데이터 부족
  if (!b) {
    return `
      <div class="home-card span-2 brief-card" id="brief-card">
        <h3>
          <span>오늘의 브리핑${modeBadgeHtml}</span>
          <span class="brief-head-meta">
            <span class="count" id="brief-count-meta">${escapeHtml(modeLabel)}</span>
            <button type="button" id="brief-reload"      class="brief-act brief-act-icon" title="새로고침">↻</button>
            <button type="button" id="brief-toggle-deep" class="brief-act">${state.briefMode === 'deep' ? '전체 보기' : '현재 ws 깊게'}</button>
          </span>
        </h3>
        <div class="brief-fallback">
          자비스가 아직 충분히 모르고 있어요. 일기 한두 번 더 쓰면 채워질 거예요.<br>
          (백엔드 <code>/api/v1/memory/brief</code> 응답 대기 중…)
        </div>
      </div>`;
  }

  const wss     = b.active_workspaces      || [];
  const threads = b.recent_threads         || [];
  const recs    = b.next_recommendations   || [];
  const dq      = b.data_quality           || {};
  const metaLine = `${b.mode || 'cross'} · ${wss.length} ws${dq.fact_count_active != null ? ` · ${dq.fact_count_active} fact` : ''}`;

  const wsHtml = wss.length === 0
    ? `<div class="empty-mini">활성 워크스페이스가 없어요</div>`
    : `<div class="brief-ws-grid">${wss.map(w => renderBriefWsChip(w)).join('')}</div>`;

  const threadsHtml = threads.length === 0
    ? `<div class="empty-mini">최근 14일 작업 흐름이 없어요</div>`
    : `<ol class="brief-thread-list">${threads.map((t, i) => renderBriefThread(t, i+1)).join('')}</ol>`;

  const recsHtml = recs.length === 0
    ? `<div class="empty-mini">추천할 신호가 아직 없어요 — 일기 한 번 더 쓰면 우선순위가 잡힙니다</div>`
    : `<div class="brief-rec-grid">${recs.map(r => renderBriefRec(r)).join('')}</div>`;

  return `
    <div class="home-card span-2 brief-card" id="brief-card">
      <h3>
        <span>오늘의 브리핑${modeBadgeHtml}</span>
        <span class="brief-head-meta">
          <span class="count" id="brief-count-meta">${escapeHtml(metaLine)}</span>
          <button type="button" id="brief-reload"      class="brief-act brief-act-icon" title="새로고침">↻</button>
          <button type="button" id="brief-toggle-deep" class="brief-act">${state.briefMode === 'deep' ? '전체 보기' : '현재 ws 깊게'}</button>
        </span>
      </h3>
      <section class="brief-section" data-section="ws">
        <div class="brief-section-h">활성 워크스페이스 <span class="brief-section-count">${wss.length}</span></div>
        ${wsHtml}
      </section>
      <div class="brief-divider"></div>
      <section class="brief-section" data-section="threads">
        <div class="brief-section-h">최근 작업 흐름 <span class="brief-section-count">${threads.length}</span></div>
        ${threadsHtml}
      </section>
      <div class="brief-divider"></div>
      <section class="brief-section" data-section="recs">
        <div class="brief-section-h">다음 추천 <span class="brief-section-count">${recs.length}</span></div>
        ${recsHtml}
      </section>
    </div>`;
}

// 활성 ws 칩 — ACTIVE / QUIET / DORMANT 톤 자동 매핑.
// 2줄 위계:
//   Line1 = 이름(15px 700)
//   Line2 = cumulative_summary 있으면 "지금까지 흐름" 한 단락(2줄 clamp)
//           없으면 기존 fallback: signal · ep · tail · subjects
function renderBriefWsChip(w) {
  const tag = w.activity_tag || 'DORMANT';
  const cumulative = (w.ws_cumulative_summary || w.cumulative_summary || '').trim();

  let subHtml;
  let subClass = 'brief-ws-sub';
  if (cumulative) {
    // 내용 신호 모드 — 자연어 한 단락, CSS 로 2줄 clamp
    // 마크다운 렌더 (DOMPurify) — chip 안 2줄 clamp 이라 인라인 강조 정도만 보임,
    // 블록(코드/리스트) 토큰은 clamp 으로 잘려도 시각 잡음 적음.
    subHtml = safeMarkdown(cumulative);
    subClass += ' is-cumulative';
  } else {
    // 활동 신호 fallback — 기존 칩 라인
    const subjects = (w.top_subjects_14d || []).slice(0, 2).join(' · ');
    const signal   = w.signal_line || (tag === 'DORMANT' ? '14일+ 미접속' : '');
    const epNum    = w.ep_count_total != null ? String(w.ep_count_total) : '';
    const tailHtml = w.ep_count_yesterday
      ? `<span>어제 <span class="num">${w.ep_count_yesterday}</span></span>`
      : (w.turn_count_7d ? `<span>7d <span class="num">${w.turn_count_7d}</span> turn</span>` : '');

    const parts = [];
    if (signal)    parts.push(`<span class="signal">${escapeHtml(signal)}</span>`);
    if (epNum)     parts.push(`<span><span class="num">${escapeHtml(epNum)}</span> 일기</span>`);
    if (tailHtml)  parts.push(tailHtml);
    if (subjects)  parts.push(`<span title="${escapeHtml(subjects)}">${escapeHtml(subjects)}</span>`);
    subHtml = parts.join('<span class="sep">·</span>');
  }

  const titleAttr = cumulative ? ` title="${escapeHtml(cumulative)}"` : '';
  const wsId = w.id || w.workspace_id || '';
  const isCurrent = wsId && wsId === WORKSPACE_ID;

  return `
    <button type="button" class="brief-ws-chip${tag === 'DORMANT' ? ' is-dormant' : ''}${isCurrent ? ' is-current' : ''}"
            data-ws-id="${escapeHtml(wsId)}"
            data-ws-name="${escapeHtml(w.name || '')}"${titleAttr}>
      <div class="brief-ws-chip-head">
        <span class="brief-ws-dot" data-tag="${escapeHtml(tag)}"></span>
        <span class="brief-ws-name">${escapeHtml(w.name || '')}</span>
        <span class="brief-ws-tag">${escapeHtml(tag)}</span>
      </div>
      <div class="${subClass}">${subHtml}</div>
    </button>`;
}

// 최근 thread 한 줄 — rank/ws/subject/meta/summary.
function renderBriefThread(t, rank) {
  const missing = t.is_summary_missing ? ' is-missing' : '';
  const summary = t.summary || (t.is_summary_missing ? '요약 없음 — 클릭하면 본문' : '');
  const dateTail = (t.last_active_date || '').slice(5);  // MM-DD
  const meta    = `${t.turn_count_14d || 0} turn${dateTail ? ' · ' + dateTail : ''}`;
  return `
    <li class="brief-thread${missing}"
        data-ws-id="${escapeHtml(t.workspace_id || '')}"
        data-ws-name="${escapeHtml(t.workspace_name || '')}"
        data-subject-id="${escapeHtml(t.subject_id || '')}"
        data-target-date="${escapeHtml(t.last_active_date || '')}">
      <span class="brief-thread-rank">${rank}</span>
      <div class="brief-thread-body">
        <div class="brief-thread-head">
          <span class="brief-thread-ws">${escapeHtml(t.workspace_name || '')}</span>
          <span class="brief-thread-sep">·</span>
          <span class="brief-thread-subject">${escapeHtml(t.subject_name || '')}</span>
          <span class="brief-thread-meta">${escapeHtml(meta)}</span>
        </div>
        <div class="brief-thread-summary">${safeMarkdown(summary)}</div>
      </div>
    </li>`;
}

// 추천 카드 — rank/ws/reason/title/detail.
function renderBriefRec(r) {
  const reasonLabel = (r.reason_code || '').replace(/_/g, ' ');
  return `
    <button type="button" class="brief-rec-new"
            data-target-kind="${escapeHtml(r.target_kind || '')}"
            data-target-id="${escapeHtml(r.target_id || '')}"
            data-ws-id="${escapeHtml(r.workspace_id || '')}"
            data-ws-name="${escapeHtml(r.workspace_name || '')}"
            data-target-date="${escapeHtml(r.target_date || '')}">
      <div class="brief-rec-new-head">
        <span class="brief-rec-new-rank">${r.rank}</span>
        <span class="brief-rec-new-ws" title="${escapeHtml(r.workspace_name || '')}">${escapeHtml(r.workspace_name || '')}</span>
        <span class="brief-rec-new-reason" data-reason="${escapeHtml(r.reason_code || '')}">${escapeHtml(reasonLabel)}</span>
      </div>
      <div class="brief-rec-new-title">${escapeHtml(r.title || '')}</div>
      <div class="brief-rec-new-detail">${safeMarkdown(r.detail || '')}</div>
    </button>`;
}

function renderHomeDashboard() {
  const d = state.dashboard;
  if (!d) {
    return `<div class="empty">대시보드 로드 중…</div>`;
  }
  // Empty workspace guide (P9.3) — episode_count < 5
  const epCount = (d.stats && d.stats.episode_count) || 0;
  if (epCount < 5) {
    return renderEmptyWorkspaceGuide(epCount);
  }

  // Block B — 최근 7일 (recent_summaries) — P8: group by date, render
  // JARVIS·Argos side-by-side so a day with both projects is visible
  // at-a-glance. Rows with turn_count=0 are paused-day stubs (still
  // shown, dimmed) — sidebar drill-down is disabled for them since
  // there's no real turn feed behind them.
  const renderRecentRow = (r) => {
    const isPaused = (r.unique_turn_count === 0 && r.turn_count === 0);
    const preview = (r.summary || '').slice(0, 240);
    const tcount = r.unique_turn_count || r.turn_count || 0;
    const dataAttrs = isPaused
      ? ''
      : ` data-sid="${r.subject_id}" data-date="${r.date}"`;
    const tlabel = isPaused ? '휴지일' : `${tcount} turns`;
    return `
      <div class="recent-row${isPaused ? ' paused' : ''}"${dataAttrs}>
        <div class="head">
          <span class="subj">${escapeHtml(r.subject_name)}</span>
          <span class="turn-n">${tlabel}</span>
        </div>
        <div class="preview">${safeMarkdown(preview)}${preview.length < (r.summary || '').length ? '…' : ''}</div>
      </div>`;
  };

  const byDate = new Map();
  for (const r of (d.recent_summaries || [])) {
    if (!byDate.has(r.date)) byDate.set(r.date, []);
    byDate.get(r.date).push(r);
  }
  const sortedDates = Array.from(byDate.keys()).sort((a, b) => b.localeCompare(a));
  const recentBlock = sortedDates.length > 0
    ? sortedDates.map(dt => {
        // Stable order: alphabetical so JARVIS·Argos columns don't flip.
        const rows = byDate.get(dt).slice().sort((a, b) =>
          (a.subject_name || '').localeCompare(b.subject_name || ''));
        const pairClass = rows.length >= 2 ? 'pair' : 'pair single';
        return `
          <div class="recent-day">
            <div class="day-label">${dt}</div>
            <div class="${pairClass}">${rows.map(renderRecentRow).join('')}</div>
          </div>`;
      }).join('')
    : `<div class="empty-mini">최근 7일 정리된 일기가 없어요 — '오늘 정리해'로 채워보세요</div>`;

  // Block C — On This Day (P7 — uses dedicated /on-this-day endpoint so we
  // get `year` + a higher cap than what /dashboard returns).
  const otd = state.onThisDay;
  const otdMatches = (otd && otd.matches && otd.matches.length > 0)
    ? otd.matches
    : ((d.on_this_day && d.on_this_day.length > 0) ? d.on_this_day : null);
  const otdBlock = otdMatches
    ? otdMatches.map(o => {
        const yearTag = o.year ? ` · ${o.year}` : '';
        return `
        <div class="otd-row" data-eid="${o.episode_id || ''}" data-date="${o.date}">
          <div class="otd-meta">${o.date}${yearTag} · <span class="days-ago">${o.days_ago}일 전</span>${o.turn_count ? ` · ${o.turn_count} turns` : ''}</div>
          <div class="otd-sum">${safeMarkdown(o.summary || '(요약 없음)')}</div>
        </div>`;
      }).join('')
    : `<div class="empty-mini">아직 같은 날짜의 과거 기록이 없어요 — 데이터 쌓이는 중</div>`;

  // Block D — Top Entities
  const topBlock = (d.top_entities && d.top_entities.length > 0)
    ? `<div class="top-ent-chips">${
        d.top_entities.map(e => `
          <span class="top-ent-chip" data-eid="${e.entity_id}" title="${escapeHtml(e.name)} · 사실 ${e.fact_count} · 관계 ${e.relation_count}">
            <span class="ent-name">${escapeHtml(e.name)}</span>
            <span class="ent-stat">${e.fact_count}·${e.relation_count}</span>
          </span>`).join('')
      }</div>`
    : `<div class="empty-mini">아직 추출된 엔티티 없음</div>`;

  // Block E — Ingest 장부 (P4)
  const ledgerBlock = renderLedgerWidget();

  return `
    <div class="home-dashboard">
      ${renderBriefCard()}
      <div class="home-card">
        <h3>오늘 · 어제 · 이번 주 <span class="count">최근 ${sortedDates.length}일 · ${d.recent_summaries.length}건</span></h3>
        ${recentBlock}
      </div>
      <div class="home-card">
        <h3>On This Day <span class="count">${(otdMatches || []).length}건</span></h3>
        ${otdBlock}
      </div>
      <div class="home-card span-2">
        <h3>위키 Top Entities <span class="count">${d.top_entities.length}건 · 사실·관계 순</span></h3>
        ${topBlock}
      </div>
      <div class="home-card span-2">
        ${ledgerBlock}
      </div>
    </div>
  `;
}

// Pretty-print bytes as KB / MB.
function fmtBytes(n) {
  if (!n && n !== 0) return '';
  if (n < 1024) return `${n}B`;
  if (n < 1024 * 1024) return `${(n / 1024).toFixed(1)}KB`;
  return `${(n / (1024 * 1024)).toFixed(1)}MB`;
}

// Pretty-print an ISO timestamp as "MM-DD HH:mm".
function fmtLedgerTs(iso) {
  try {
    const dt = new Date(iso);
    const mm = String(dt.getMonth() + 1).padStart(2, '0');
    const dd = String(dt.getDate()).padStart(2, '0');
    const hh = String(dt.getHours()).padStart(2, '0');
    const mi = String(dt.getMinutes()).padStart(2, '0');
    return `${mm}-${dd} ${hh}:${mi}`;
  } catch (_) {
    return iso || '';
  }
}

function basename(p) {
  if (!p) return '(unknown)';
  const idx = Math.max(p.lastIndexOf('/'), p.lastIndexOf('\\'));
  return idx >= 0 ? p.slice(idx + 1) : p;
}

function renderLedgerWidget() {
  const lg = state.ledger;
  // Head with title + diff badges
  const notIngested = lg?.local_diff_summary?.not_ingested ?? 0;
  const matched = lg?.local_diff_summary?.matched ?? 0;
  const totalLedger = lg?.total ?? 0;

  const diffBadge = (notIngested > 0)
    ? `<span class="ledger-badge warn" data-action="open-ledger" title="안 올라간 본대화 ${notIngested}건 — 클릭하면 목록">
         · 안 올라간 본대화 ${notIngested}건
       </span>`
    : `<span class="ledger-badge" data-action="open-ledger" title="모든 본대화가 자비스에 올라가 있음">
         · 본대화 ${matched}건 전부 올라감
       </span>`;

  const head = `
    <div class="ledger-head">
      <h3 style="margin-bottom: 0;">Ingest 장부 <span class="count">${totalLedger}건 누적</span></h3>
      ${diffBadge}
      <span class="ledger-badge" data-action="open-ledger" title="전체 ledger 보기">· 전체 보기</span>
    </div>`;

  if (!lg || !lg.entries || lg.entries.length === 0) {
    return head + `<div class="empty-mini">아직 ingest 기록 없음 — 자비스에 일기를 올리면 여기 누적됩니다</div>`;
  }

  // Show the most recent ~8 entries inline
  const rows = lg.entries.slice(0, 8).map(e => {
    const dec = e.dedup_decision || 'new';
    const fname = basename(e.source_file_path) || e.external_session_id || '(unnamed)';
    return `
      <div class="ledger-row" title="${escapeHtml(e.source_file_path || '')}">
        <span class="ts">${fmtLedgerTs(e.ingested_at)}</span>
        <span class="fname">${escapeHtml(fname)}</span>
        <span class="turn-n">${(e.turn_count || 0).toLocaleString()} turns</span>
        <span class="via">${escapeHtml(e.ingested_via || 'unknown')}</span>
        <span class="dedup-tag ${escapeHtml(dec)}">${escapeHtml(dec)}</span>
      </div>`;
  }).join('');

  return head + `<div class="ledger-rows">${rows}</div>`;
}

function openLedgerModal() {
  const lg = state.ledger;
  if (!lg) return;

  const allRows = (lg.entries || []).map(e => {
    const dec = e.dedup_decision || 'new';
    const fname = basename(e.source_file_path) || e.external_session_id || '(unnamed)';
    return `
      <div class="ledger-row" title="${escapeHtml(e.source_file_path || '')}">
        <span class="ts">${fmtLedgerTs(e.ingested_at)}</span>
        <span class="fname">${escapeHtml(fname)}</span>
        <span class="turn-n">${(e.turn_count || 0).toLocaleString()} turns</span>
        <span class="via">${escapeHtml(e.ingested_via || 'unknown')}</span>
        <span class="dedup-tag ${escapeHtml(dec)}">${escapeHtml(dec)}</span>
      </div>`;
  }).join('') || `<div class="empty-mini">ingest 기록 없음</div>`;

  const diffRows = (lg.local_diff || []).map(d => {
    const tag = d.status === 'not_ingested' ? 'rejected' : 'new';
    const label = d.status === 'not_ingested' ? '안 올라감' : `올라감 (${d.ingested_count}회)`;
    return `
      <div class="ledger-row" title="${escapeHtml(d.local_file_path)}">
        <span class="ts">${fmtBytes(d.local_size)}</span>
        <span class="fname">${escapeHtml(basename(d.local_file_path))}</span>
        <span class="via">${escapeHtml(d.external_session_id || '')}</span>
        <span class="dedup-tag ${tag}">${label}</span>
      </div>`;
  }).join('') || `<div class="empty-mini">로컬 스캔 데이터 없음 (include_local_diff=false?)</div>`;

  const modal = document.createElement('div');
  modal.className = 'ledger-modal';
  modal.innerHTML = `
    <div class="inner">
      <button class="close" aria-label="닫기">×</button>
      <h2>Ingest 장부 — 본대화 N개 중 무엇이 올라갔나</h2>
      <div class="sub">최근 ingest ${lg.entries?.length || 0}건 · 로컬 jsonl ${lg.local_diff?.length || 0}건 (≥100KB)</div>
      <div class="scroll">
        <section>
          <h3>최근 ingest 타임라인</h3>
          <div class="ledger-rows">${allRows}</div>
        </section>
        <section>
          <h3>로컬 ↔ 클라우드 대조</h3>
          <div class="ledger-rows">${diffRows}</div>
        </section>
      </div>
    </div>`;
  modal.onclick = (ev) => {
    if (ev.target === modal || ev.target.classList.contains('close')) {
      modal.remove();
    }
  };
  document.body.appendChild(modal);
}

// Stage 2C — D3 force-directed graph view of the workspace entity network.
// `/graph` returns hub-cut nodes (top-N by relation_count) + edges whose
// both endpoints survive the cut. Node click reuses `openEntityPage` so
// state.entityStack / backdrop-close already Just Work.

// entity_type -> swatch color. Falls back to var(--text-3) for unknown.
const GRAPH_TYPE_COLOR = {
  concept:      '#6b8bd6',
  product:      '#d6a86b',
  person:       '#9b6bd6',
  organization: '#6bd6c9',
  location:     '#d66b8b',
  event:        '#6bd68b',
  preference:   '#d6c96b',
  procedure:    '#a8d66b',
  other:        '#8a8a8a',
};

async function loadGraph() {
  const mount = $('wiki-graph-view');
  if (!mount) return;
  mount.innerHTML = `<div class="graph-empty">그래프 로드 중…</div>`;
  let data;
  try {
    data = await post('/graph', {
      workspace_id: WORKSPACE_ID,
      limit: 100,
      min_rel_cnt: 1,
    });
  } catch (e) {
    mount.innerHTML = `<div class="graph-empty">로드 실패: ${escapeHtml(e.message)}</div>`;
    return;
  }
  state.graphData = data;
  renderEntityGraph(data);
}

function renderEntityGraph(data) {
  const mount = $('wiki-graph-view');
  if (!mount) return;
  const nodes = (data.nodes || []).map(n => ({ ...n }));  // d3 mutates in place
  const edges = (data.edges || []).map(e => ({
    source: String(e.from_id),
    target: String(e.to_id),
    relation_type: e.relation_type,
    weight: e.weight || 1,
  }));
  if (nodes.length === 0) {
    mount.innerHTML = `<div class="graph-empty">관계가 있는 엔티티가 없습니다 (min_rel_cnt ≥ 1)</div>`;
    return;
  }

  // Distinct relation_types appearing in the current cut, for the legend.
  const relTypesInEdges = [...new Set(edges.map(e => e.relation_type))];
  const legendItems = relTypesInEdges.map(rt => {
    const cls = ['part_of', 'depends_on', 'supports', 'contradicts', 'related_to'].includes(rt) ? rt : 'related_to';
    return `<span class="legend"><span class="swatch" style="width: 16px; height: 3px; border-radius: 0; background: var(--text-3);"></span><span style="color:var(--text-3);">${escapeHtml(rt)}</span></span>`;
  }).slice(0, 5).join('');

  mount.innerHTML = `
    <div class="graph-controls">
      <span>${data.returned_nodes}/${data.total_entities} 노드 · ${edges.length} 엣지</span>
      <span style="flex:1;"></span>
      <span style="color:var(--text-3);">드래그로 노드 이동 · 휠로 줌 · 클릭 → 엔티티 페이지</span>
    </div>
    <div class="graph-view" id="graph-canvas"></div>`;

  const canvas = $('graph-canvas');
  const width  = canvas.clientWidth  || 900;
  const height = canvas.clientHeight || 600;

  const svg = d3.select(canvas).append('svg')
    .attr('viewBox', `0 0 ${width} ${height}`)
    .attr('preserveAspectRatio', 'xMidYMid meet');

  // Root <g> that zoom transforms apply to.
  const root = svg.append('g');
  svg.call(d3.zoom()
    .scaleExtent([0.25, 4])
    .on('zoom', (ev) => root.attr('transform', ev.transform)));

  // rel_cnt → radius (sqrt scale so very-high-degree hubs don't dominate).
  const maxRel = d3.max(nodes, d => d.rel_cnt) || 1;
  const rScale = d3.scaleSqrt().domain([0, maxRel]).range([5, 18]);

  const sim = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(edges).id(d => String(d.id)).distance(80).strength(0.4))
    .force('charge', d3.forceManyBody().strength(-200))
    .force('center', d3.forceCenter(width / 2, height / 2))
    .force('collide', d3.forceCollide().radius(d => rScale(d.rel_cnt) + 4));

  const link = root.append('g').attr('class', 'graph-links')
    .selectAll('line')
    .data(edges)
    .join('line')
      .attr('class', d => {
        const known = ['part_of', 'depends_on', 'supports', 'contradicts', 'related_to'];
        const cls = known.includes(d.relation_type) ? d.relation_type : 'related_to';
        return `graph-link ${cls}`;
      })
      .attr('stroke-width', d => Math.min(1 + Math.log2(d.weight + 1), 4));

  const node = root.append('g').attr('class', 'graph-nodes')
    .selectAll('g')
    .data(nodes)
    .join('g')
      .attr('class', 'graph-node')
      .call(d3.drag()
        .on('start', (ev, d) => { if (!ev.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
        .on('drag',  (ev, d) => { d.fx = ev.x; d.fy = ev.y; })
        .on('end',   (ev, d) => { if (!ev.active) sim.alphaTarget(0); d.fx = null; d.fy = null; }))
      .on('click', (ev, d) => { ev.stopPropagation(); openEntityPage(String(d.id)); });

  node.append('title').text(d =>
    `${d.name}\n${d.entity_type} · rel=${d.rel_cnt}${d.has_wiki ? ' · wiki' : ''}`
  );

  node.append('circle')
    .attr('r', d => rScale(d.rel_cnt))
    .attr('fill', d => GRAPH_TYPE_COLOR[d.entity_type] || GRAPH_TYPE_COLOR.other)
    .attr('stroke-dasharray', d => d.has_wiki ? null : '2,2');

  node.append('text')
    .attr('dx', d => rScale(d.rel_cnt) + 4)
    .attr('dy', '0.32em')
    .text(d => d.name.length > 24 ? d.name.slice(0, 22) + '…' : d.name);

  sim.on('tick', () => {
    link
      .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    node.attr('transform', d => `translate(${d.x},${d.y})`);
  });
}

// Today's Brief 카드 이벤트 — 추천/활성ws/최근thread 클릭, 새로고침/모드 토글.
// ws 가 현재와 다르면 ws 전환 풀-리로드 (ws 드롭다운 핸들러 패턴 복제).
function wireBriefCard() {
  const card = $('brief-card');
  if (!card) return;

  // 공통 점프 — ws 전환이 필요하면 풀-리로드, 같은 ws 면 kind 별 점프.
  const jumpToWorkspace = async (wsId, wsName, date, kind, tid) => {
    if (wsId && wsId !== WORKSPACE_ID) {
      WORKSPACE_ID = wsId;
      WORKSPACE_NAME = wsName;
      setWsLabel(wsName);
      state.selectedTopicId = null;
      state.selectedSubId = null;
      state.selectedDate = date || null;
      state.subTree = null;
      state.subjectsMap = {};
      state.searchActive = false;
      state.onThisDay = null;
      state.wikiIndex = null;
      state.brief = null;
      restoreLayout();
      await Promise.all([
        loadTopics(), loadDateTree(), loadSubTree(),
        loadDashboard(), loadLedger(), loadOnThisDay(), loadBrief(),
      ]);
      // ws 전환 후에도 아래 target 점프까지 이어서 수행한다. (early-return 제거 —
      // 전엔 새 ws 홈에만 떨구고 엔티티/주제 target을 버려서 "제대로 이동 안 됨")
    }
    // target 점프 (같은 ws · ws 전환 후 공통)
    if      (kind === 'subject'  && tid)  { if (date) state.selectedDate = date; selectTopicFromHome(tid); }
    else if (kind === 'entity'   && tid)  { openEntityPage(tid); }
    else if (kind === 'episode'  && date) { selectDate(date); }
    else if (date)                        { selectDate(date); }
    else                                  { await refreshBody(); }
  };

  // 추천 카드
  for (const btn of card.querySelectorAll('.brief-rec-new')) {
    btn.onclick = () => jumpToWorkspace(
      btn.dataset.wsId || '',
      btn.dataset.wsName || '',
      btn.dataset.targetDate || null,
      btn.dataset.targetKind || '',
      btn.dataset.targetId || '',
    );
  }
  // 활성 ws 칩 → 단순 ws 전환
  for (const chip of card.querySelectorAll('.brief-ws-chip')) {
    chip.onclick = () => jumpToWorkspace(
      chip.dataset.wsId || '',
      chip.dataset.wsName || '',
      null,
      'workspace',
      '',
    );
  }
  // 최근 thread → subject 점프
  for (const li of card.querySelectorAll('.brief-thread')) {
    li.onclick = () => jumpToWorkspace(
      li.dataset.wsId || '',
      li.dataset.wsName || '',
      li.dataset.targetDate || null,
      'subject',
      li.dataset.subjectId || '',
    );
  }

  const reload = $('brief-reload');
  if (reload) reload.onclick = async () => {
    await loadBrief();
    await refreshBody();
  };
  const toggle = $('brief-toggle-deep');
  if (toggle) toggle.onclick = async () => {
    state.briefMode = (state.briefMode === 'deep') ? 'cross' : 'deep';
    await loadBrief();
    await refreshBody();
  };
}

function wireHomeDashboard() {
  const body = $('chat-body');
  if (!body) return;
  wireBriefCard();
  for (const el of body.querySelectorAll('.recent-row[data-sid]')) {
    el.onclick = () => {
      const sid = el.getAttribute('data-sid');
      const date = el.getAttribute('data-date');
      if (date) state.selectedDate = date;
      // Use topic select to drive the standard refreshBody flow
      selectTopicFromHome(sid);
    };
  }
  for (const el of body.querySelectorAll('.top-ent-chip[data-eid]')) {
    el.onclick = () => openEntityPage(el.getAttribute('data-eid'));
  }
  // P4 — Ingest 장부 badges
  for (const el of body.querySelectorAll('[data-action="open-ledger"]')) {
    el.onclick = () => openLedgerModal();
  }
  // P7 — On This Day rows → jump to that date
  for (const el of body.querySelectorAll('.otd-row[data-date]')) {
    el.style.cursor = 'pointer';
    el.onclick = () => {
      const d = el.getAttribute('data-date');
      if (d) selectDate(d);
    };
  }
  // P9.3 — Empty workspace guide CTA → switch to 자비스프로젝트 if available
  const switchBtn = body.querySelector('#ws-switch-to-active');
  if (switchBtn) {
    switchBtn.onclick = async () => {
      const target = (state.workspaces || []).find(w => w.name === '자비스 캡스톤 프로젝트')
                  || (state.workspaces || []).find(w => w.name === '자비스프로젝트');
      if (target) {
        WORKSPACE_ID = target.id;
        WORKSPACE_NAME = target.name;
        setWsLabel(target.name);
        state.selectedTopicId = null;
        state.selectedSubId = null;
        state.selectedDate = null;
        state.subTree = null;
        state.subjectsMap = {};
        state.searchActive = false;
        state.brief = null;
        restoreLayout();
        await Promise.all([loadTopics(), loadDateTree(), loadSubTree(), loadDashboard(), loadOnThisDay(), loadLedger(), loadBrief()]);
        await refreshBody();
      }
    };
  }
}

// Choose between selectTopic (top-level) and selectSub (sub) based on subjectsMap.
async function selectTopicFromHome(sid) {
  const meta = state.subjectsMap[sid];
  if (meta && meta.parent_id) {
    state.selectedTopicId = meta.parent_id;
    await loadSubTree();
    renderTopics();
    state.selectedSubId = sid;
    renderSubtopics();
    state.searchActive = false;
    await refreshBody();
  } else {
    await selectTopic(sid);
  }
}

async function refreshBody(append = false) {
  if (state.searchActive) return;
  const head = $('chat-head');
  const body = $('chat-body');

  if (!append) state.turnsLimit = 1000;

  // Decide which API
  let turns = [];
  let totalTurns = 0;
  let hasMore = false;
  let titleParts = [];
  let req;
  const targetSubId = state.selectedSubId || state.selectedTopicId;
  if (targetSubId) {
    req = { workspace_id: WORKSPACE_ID, subject_id: targetSubId, include_descendants: true, descending: false, limit: state.turnsLimit };
    if (state.selectedDate) {
      req.date_from = `${state.selectedDate}T00:00:00Z`;
      req.date_to = nextDay(state.selectedDate) + 'T00:00:00Z';
    }
    const r = await post('/subject-feed', req);
    turns = r.turns; totalTurns = r.total_turns ?? turns.length; hasMore = r.has_more === true;
    titleParts.push(r.subject_name);
  } else if (state.selectedDate) {
    // 일기 모드: 날짜 단독 선택 → 그 날의 episode 일기 카드 list
    await renderDiariesByDate(state.selectedDate);
    return;
  } else {
    const stats = state.dashboard?.stats;
    const range = (stats?.first_date && stats?.last_date) ? `${stats.first_date} ~ ${stats.last_date}` : '데이터 누적 중';
    head.innerHTML = renderChatHeadHome(`홈 · ${range}`);
    body.innerHTML = renderHomeDashboard();
    wireHomeDashboard();
    renderKeywordsAndSummary(null, []);
    return;
  }
  state.totalTurns = totalTurns;
  state.hasMore = hasMore;

  // Title + meta
  const tags = [];
  if (state.selectedTopicId) {
    const top = state.topics.find(t => t.subject_id === state.selectedTopicId);
    if (top) tags.push(top.name);
  }
  if (state.selectedDate) tags.push(state.selectedDate);
  const tagsHtml = tags.map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('');
  let metaLine = '';
  if (turns.length > 0) {
    const first = turns[0].timestamp;
    const last = turns[turns.length - 1].timestamp;
    const total = totalTurns || turns.length;
    const shownNote = total > turns.length ? ` · 표시 ${turns.length} / ${total}` : '';
    metaLine = `${dateKey(first)} · ${fmtTime(first)} — ${fmtTime(last)} KST · ${turns.length} turns${shownNote}`;
  } else {
    metaLine = '대화 없음';
  }
  head.innerHTML = `<h1>${escapeHtml(titleParts[0] || '일기')} ${tagsHtml}</h1><div class="meta">${metaLine}</div>`;

  // Render turns
  if (turns.length === 0) {
    body.innerHTML = '<div class="empty">해당 범위에 대화 없음.</div>';
    renderKeywordsAndSummary(null, []);
    return;
  }
  body.innerHTML = renderTurnsBlock(turns);
  if (hasMore) {
    const more = document.createElement('div');
    more.className = 'load-more';
    const remaining = Math.max(0, totalTurns - turns.length);
    more.textContent = `+ 더 보기 (${remaining.toLocaleString()}건 남음)`;
    more.onclick = async () => {
      state.turnsLimit = Math.min(5000, state.turnsLimit + 1000);
      await refreshBody(true);
    };
    body.appendChild(more);
  }

  renderKeywordsAndSummary(turns, await fetchSummaries());

  // P9.4 — search jump + highlight (검색 결과 클릭 후 첫 refreshBody에서만 동작)
  if (state.searchJumpTerm) {
    const term = state.searchJumpTerm;
    const epId = state.searchJumpEpisodeId;
    state.searchJumpTerm = null;
    state.searchJumpEpisodeId = null;
    requestAnimationFrame(() => {
      const re = new RegExp(escapeRegex(term), 'gi');
      let firstHit = null;
      for (const row of body.querySelectorAll('.turn-row')) {
        const bubble = row.querySelector('.bubble');
        if (!bubble) continue;
        const html = bubble.innerHTML;
        const replaced = html.replace(/(>)([^<]+)(<)/g, (_, a, txt, c) =>
          a + txt.replace(re, m => `<mark>${m}</mark>`) + c
        );
        if (replaced !== html) {
          bubble.innerHTML = replaced;
          if (!firstHit) firstHit = row;
        }
      }
      const target = firstHit
        || (epId ? body.querySelector(`.turn-row [data-eid="${epId}"]`) : null)
        || body.querySelector('.turn-row');
      if (target) {
        target.scrollIntoView({ behavior: 'smooth', block: 'center' });
        target.classList.add('search-hit');
      }
    });
  }
}

function escapeRegex(s) {
  return String(s || '').replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function renderEmptyWorkspaceGuide(n) {
  return `
    <div class="empty-ws-guide">
      <h2>이 워크스페이스에 일기 ${n}건뿐</h2>
      <div class="lead">아직 비었어요. AI가 자비스에 자동으로 일기를 누적하려면 트랜스크립트 정리 명령을 한 번 내려주세요.</div>
      <code class="cmd">"이 세션 자비스에 올려줘" 또는 "오늘 대화 정리해서 자비스에 박아"</code>
      <div class="lead" style="margin-top:18px;">AI는 트랜스크립트 위치를 찾아 정제하고 풍부한 요약 + 핵심 fact/entity를 같이 박아둡니다. 다른 세션에서도 회상 가능.</div>
      <div style="margin-top:20px;">
        <span class="switch-ws" id="ws-switch-to-active">활성 워크스페이스(자비스프로젝트) 미리보기</span>
      </div>
    </div>
  `;
}

// ── Diary-first view (날짜 단독 선택 시 메인 뷰) ──
state.dayTurnsCache = {};

async function renderDiariesByDate(d) {
  const head = $('chat-head');
  const body = $('chat-body');
  const dateFrom = `${d}T00:00:00Z`;
  const dateTo = nextDay(d) + 'T00:00:00Z';

  body.innerHTML = `<div class="empty">일기 불러오는 중…</div>`;

  let diariesR, timelineR;
  try {
    [diariesR, timelineR] = await Promise.all([
      post('/diaries-by-date', { workspace_id: WORKSPACE_ID, date_from: dateFrom, date_to: dateTo, descending: false }),
      post('/timeline', { workspace_id: WORKSPACE_ID, date_from: dateFrom, date_to: dateTo, descending: false, limit: 2000 }),
    ]);
  } catch (e) {
    body.innerHTML = `<div class="empty">일기 로드 실패: ${escapeHtml(e.message)}</div>`;
    return;
  }
  const items = diariesR.items || [];
  state.dayTurnsCache[d] = timelineR.turns || [];

  const dayLabel = `${d} ${weekdayKR(d)}`;
  head.innerHTML = `<div class="chat-title">
    <span class="ct-main">${escapeHtml(dayLabel)}</span>
    <span class="tag">${items.length} 일기</span>
    <span class="ct-hint">일기는 AI가 그 날을 관찰자 시점으로 정리한 노트입니다. 카드 끝 "대화록 펼치기"로 원본 대화 확인 가능.</span>
  </div>`;

  if (!items.length) {
    body.innerHTML = `<div class="empty">이 날짜에 episode 없음.</div>`;
    return;
  }
  body.innerHTML = `<div class="diary-list">${items.map(renderDiaryCard).join('')}</div>`;
  wireDiaryCards(d);

  // Sidebar: 그 날 다룬 주제(좌측 turns 기반) + 사람용 요약(human_summary 우선)
  const dayTurns = state.dayTurnsCache[d] || [];
  const summaries = items.map(it => ({
    date: (it.day_ts || '').slice(0, 10) || d,
    subject_name: it.title || '일기',
    turn_count: it.turn_count,
    summary: it.human_summary || it.summary || '',
  }));
  // "다룬 주제" = 그 날 episode들의 키워드 집계 (turn_subjects가 평평한 ws에서도 채워짐).
  const kwFreq = {};
  for (const it of items) for (const kw of (it.keywords || [])) {
    const k = String(kw).trim();
    if (k) kwFreq[k] = (kwFreq[k] || 0) + 1;
  }
  const epKeywords = Object.entries(kwFreq)
    .sort((a, b) => b[1] - a[1])
    .map(([name, count]) => ({ name, count }));
  renderKeywordsAndSummary(dayTurns, summaries, epKeywords);

  // 검색 결과 클릭으로 들어온 경우 해당 episode 카드로 스크롤 + 강조 (일기 카드 뷰용)
  if (state.searchJumpEpisodeId) {
    const epId = state.searchJumpEpisodeId;
    state.searchJumpEpisodeId = null;
    state.searchJumpTerm = null;
    requestAnimationFrame(() => {
      const card = body.querySelector(`.diary-card[data-ep="${epId}"]`);
      if (card) {
        card.scrollIntoView({ behavior: 'smooth', block: 'center' });
        card.classList.add('search-hit');
        setTimeout(() => card.classList.remove('search-hit'), 2600);
      }
    });
  }
}

function renderDiaryCard(it) {
  const time = it.day_ts ? fmtTime(it.day_ts) : '';
  const epShort = String(it.episode_id || '').slice(0, 8);
  const entry = it.diary_entry || '';
  const hasDiary = !!entry.trim();
  const placeholder = hasDiary
    ? ''
    : `<div class="diary-placeholder">⚠ 일기 아직 작성 안 됨 — summary로 대체 표시</div>`;
  const body = hasDiary ? entry : (it.summary || '(요약 없음)');
  let html;
  try {
    html = (typeof DOMPurify !== 'undefined' && typeof marked !== 'undefined')
      ? DOMPurify.sanitize(marked.parse(body))
      : escapeHtml(body).replace(/\n/g, '<br/>');
  } catch (e) {
    html = escapeHtml(body).replace(/\n/g, '<br/>');
  }
  const title = it.title ? `<div class="diary-title">${escapeHtml(it.title)}</div>` : '';
  return `
    <article class="diary-card" data-ep="${it.episode_id}">
      <header class="diary-head">
        <span class="diary-time">${escapeHtml(time)}</span>
        <span class="diary-meta">${it.turn_count} turns · ep ${epShort}</span>
      </header>
      ${title}
      ${placeholder}
      <div class="diary-body">${html}</div>
      <footer class="diary-foot">
        <button class="show-turns-btn" data-ep="${it.episode_id}">💬 대화록 펼치기 (${it.turn_count} turns)</button>
        <div class="diary-turns-slot" data-slot-ep="${it.episode_id}" hidden></div>
      </footer>
    </article>
  `;
}

function wireDiaryCards(d) {
  for (const btn of document.querySelectorAll('.show-turns-btn')) {
    btn.onclick = () => {
      const ep = btn.getAttribute('data-ep');
      const slot = document.querySelector(`.diary-turns-slot[data-slot-ep="${ep}"]`);
      if (!slot) return;
      if (!slot.hidden) {
        slot.hidden = true;
        btn.textContent = btn.textContent.replace('접기', '대화록 펼치기');
        return;
      }
      if (!slot.dataset.loaded) {
        const turns = (state.dayTurnsCache[d] || []).filter(t => t.episode_id === ep);
        slot.innerHTML = turns.length
          ? renderTurnsBlock(turns)
          : `<div class="empty-mini">이 episode의 turn이 캐시에 없음.</div>`;
        slot.dataset.loaded = '1';
      }
      slot.hidden = false;
      btn.textContent = btn.textContent.replace('대화록 펼치기', '접기');
    };
  }
}

function renderTurnsBlock(turns) {
  // Count episodes — if too many (>20 unique in shown turns), suppress dividers
  // because subject-feed results often interleave many small episodes.
  const uniqueEps = new Set(turns.map(t => t.episode_id));
  const showDividers = uniqueEps.size <= 20;
  let html = '';
  let prevEp = null;
  let prevRole = null;
  for (const t of turns) {
    let dividerShown = false;
    if (showDividers && t.episode_id !== prevEp) {
      const epShort = String(t.episode_id || '').slice(0, 8);
      const dateOnly = (t.timestamp || '').slice(0, 10);
      const timeOnly = fmtTime(t.timestamp);
      html += `<div class="episode-divider">`
            + `<span class="ep-date">${escapeHtml(dateOnly)}</span>`
            + `<span class="ep-meta">${escapeHtml(timeOnly)}</span>`
            + `<span class="ep-tag">ep ${escapeHtml(epShort)}</span>`
            + `</div>`;
      prevEp = t.episode_id;
      dividerShown = true;
      prevRole = null;  // reset speaker chain after divider
    }
    const sameSpeaker = (!dividerShown && prevRole === t.role);
    html += renderTurn(t, sameSpeaker);
    prevRole = t.role;
  }
  return html;
}

// Activate GFM + single-newline → <br> so flat turn.text bodies render with breaks.
if (typeof marked !== 'undefined' && marked.setOptions) {
  marked.setOptions({ breaks: true, gfm: true });
}

function safeMarkdown(text) {
  return DOMPurify.sanitize(marked.parse(text || ''), { ADD_ATTR: ['target'] });
}

// Tool-call line patterns from older ingest (Read/Bash/[결과] etc.).
// In cleaned view: strip them. In raw view: keep as-is.
// `/i` 대소문자 무시 (tool_result / TOOL_RESULT 둘 다). 한국어 [결과] 는 \b 가
// 안 먹어서 별도 RESULT_LINE_RE 로 처리.
const TOOL_LINE_RE = /^\s*\[(Read|Write|Edit|Bash|Grep|Glob|TOOL_USE|TOOL_RESULT|tool_result|tool_use|TodoWrite|WebFetch|WebSearch|Agent|NotebookEdit|MultiEdit|LS)\b/i;
// "[결과]" 단독 줄 또는 "[결과] ..." 머리 — \b 가 한글에 안 먹어서 분리.
const RESULT_LINE_RE = /^\s*\[결과\]?(?:\s|$)/;
// cat -n / file read 줄번호 prefix: "   123→content" 형태 — older ingest noise.
const LINE_NUM_RE = /^\s*\d+→/;
function cleanTurnText(text) {
  if (!state.cleanedView || !text) return text || '';
  return text.split('\n').filter(line =>
    !TOOL_LINE_RE.test(line) &&
    !RESULT_LINE_RE.test(line) &&
    !LINE_NUM_RE.test(line)
  ).join('\n').trim();
}

// Flat turn.text (한 줄에 여러 문단) 를 시각적으로 끊기 위해 휴리스틱하게 \n\n 주입.
// 안전책: 이미 줄바꿈 충분하면 거의 no-op.
function injectParagraphBreaks(text) {
  if (!text) return text;
  let s = text;
  // (a) 시간 패턴 (HH:MM) 앞에 \n\n, 뒤에 \n  — 일기/회상 본문에서 시각 표기 분리
  s = s.replace(/(?<=[\.\?\!\s])(\d{1,2}:\d{2})(?=\s)/g, '\n\n$1\n');
  // (b) Phase 패턴 (Phase 1, Phase 2.1 …) 앞에 \n\n
  s = s.replace(/(?<![\n])\bPhase\s+\d+(?:\.\d+)?(?=[:\s])/g, '\n\n$&');
  // (c) (1) (2) (3) … 인라인 번호 매기기 앞에 \n
  s = s.replace(/(?<=\S\s)(\(\d+\))/g, '\n$1');
  return s.trim();
}

function renderTurn(t, sameSpeaker) {
  const role = t.role || 'assistant';
  const time = fmtTime(t.timestamp);
  // 서버 정제분(turn.cleaned_text)이 있으면 우선 사용. 토글 OFF 또는 cleaned_text 없으면 raw.
  const hasServerClean = (t.cleaned_text != null && t.cleaned_text !== '');
  const source = (state.cleanedView && hasServerClean) ? t.cleaned_text : t.text;
  // 서버 정제분이 이미 들어왔으면 클라이언트 정규식 strip 은 skip (이중 정제 방지).
  const cleaned = (state.cleanedView && hasServerClean)
    ? (source || '').trim()
    : cleanTurnText(source);
  if (!cleaned) return '';  // turn was 100% tool noise → skip
  const broken = injectParagraphBreaks(cleaned);
  const rendered = safeMarkdown(broken);
  const sameClass = sameSpeaker ? ' same-speaker' : '';
  if (role === 'user') {
    return `<div class="turn-row user${sameClass}"><div class="bubble user">${rendered}</div><span class="ts">${time}</span></div>`;
  }
  if (role === 'assistant') {
    return `<div class="turn-row assistant${sameClass}"><div class="bubble assistant">${rendered}</div><span class="ts">${time}</span></div>`;
  }
  // tool / system — collapsible
  const firstLine = (cleaned.split('\n', 1)[0] || role).slice(0, 80);
  return `<div class="turn-row ${role}${sameClass}">`
       + `<div class="bubble ${role}">`
       + `<span class="tool-head" data-toggle="tool">${escapeHtml(role)} · ${escapeHtml(firstLine)}</span>`
       + `<div class="tool-body">${rendered}</div>`
       + `</div></div>`;
}

// ── Keywords + summaries panel ──
async function fetchSummaries() {
  const req = { workspace_id: WORKSPACE_ID };
  if (state.selectedDate) {
    req.date_from = state.selectedDate;
    req.date_to = nextDay(state.selectedDate);
  }
  if (state.selectedSubId || state.selectedTopicId) {
    req.subject_id = state.selectedSubId || state.selectedTopicId;
  }
  try {
    const r = await post('/summaries', req);
    return r.summaries;
  } catch (e) {
    return [];
  }
}

function renderKeywordsAndSummary(turns, summaries, epKeywords) {
  const kwBox = $('keywords');
  const kwCount = $('keywords-count');
  const summBox = $('summaries');
  const summCount = $('summaries-count');

  // "다룬 주제" 패널: 본문/범위에서 다룬 sub-subject 이름들. top-level 제외.
  // Fallback when no turns shown (onboarding / empty filter): workspace-wide top sub-subjects.
  let keywords = [];
  let keywordsMode = 'turns';  // 'turns' (본문) | 'workspace' (전체) | 'keywords' (episode 키워드)
  // Episode-keyword mode: 호출자가 그 범위 episode 키워드를 넘기면 그걸 쓴다.
  // (캡스톤처럼 모든 turn이 한 subject에 묶인 ws에서도 우측 패널이 채워짐)
  if (epKeywords && epKeywords.length) {
    keywords = epKeywords.slice(0, 24).map(k => ({ name: k.name, count: k.count }));
    keywordsMode = 'keywords';
  }
  // 실제 데이터 구조: 그 날 다룬 "의미 주제"(타세션 맥락 회상, 다크 시안 UI 등)는
  // top-level(parent_id=null)에 있고, sub-subject는 오히려 episode 자동제목
  // ("JARVIS > 프로젝트 완성 작업 (2026-05-28~29)")이다. 그래서 parent_id 유무로
  // 거르지 않고, (1)episode_topic/자동제목 (2)워크스페이스명급 큰 주제만 제외한다.
  const WS_TOPIC_NAMES = new Set(['JARVIS', '자비스', 'Argos', '아르고스', '자비스프로젝트', '펀드메신저']);
  const looksLikeAutoTopic = (name) =>
    !name || / > /.test(name) || /\(\d{4}-\d{2}-\d{2}[^)]*\)\s*$/.test(name);
  const isIndexable = (meta) =>
    meta && meta.name
    && meta.entity_type !== 'episode_topic'
    && !looksLikeAutoTopic(meta.name)
    && !WS_TOPIC_NAMES.has(meta.name.trim());
  // prefix 정리 — 현재 워크스페이스가 그 주제이므로 "JARVIS > ", "Argos > " 등 머리 제거.
  const cleanTopicName = (name) => {
    let s = String(name || '');
    s = s.replace(/^\s*(JARVIS|Argos|자비스|아르고스)\s*>\s*/i, '');
    s = s.replace(/\s*\(\d{4}-\d{2}-\d{2}[^)]*\)\s*$/, '');  // 끝 날짜 괄호 제거
    return s.trim() || String(name || '');
  };
  if (keywords.length === 0 && turns && turns.length > 0) {
    const freq = {};
    for (const t of turns) {
      for (const sid of (t.subjects || [])) {
        const meta = state.subjectsMap[sid];
        if (!isIndexable(meta)) continue;
        freq[sid] = (freq[sid] || 0) + 1;
      }
    }
    keywords = Object.entries(freq)
      .sort((a, b) => b[1] - a[1])
      .slice(0, 24)
      .map(([sid, n]) => ({ subject_id: sid, name: cleanTopicName(state.subjectsMap[sid].name), count: n }));
  }
  if (keywords.length === 0) {
    // Fallback: workspace-wide sub-subjects by turn_count
    keywordsMode = 'workspace';
    keywords = Object.entries(state.subjectsMap || {})
      .filter(([_, m]) => isIndexable(m))
      .map(([sid, m]) => ({ subject_id: sid, name: cleanTopicName(m.name), count: m.turn_count }))
      .sort((a, b) => b.count - a.count)
      .slice(0, 24);
  }
  if (keywords.length === 0) {
    kwBox.innerHTML = '<div class="empty-mini">하위 주제 없음</div>';
    kwCount.textContent = '';
  } else {
    const VISIBLE_KW_LIMIT = 18;
    // hot 임계 — 상위 5개 임의값 대신 "최대빈도의 50%"라는 상대값
    const HOT_THRESHOLD = Math.max(3, (keywords[0]?.count || 0) * 0.5);
    const overflow = Math.max(0, keywords.length - VISIBLE_KW_LIMIT);
    const chipsHtml = keywords.map((k, i) => {
      const label = k.name.length > 38 ? k.name.slice(0, 36) + '…' : k.name;
      const hidden = i >= VISIBLE_KW_LIMIT ? ' is-hidden' : '';
      const overflowAttr = i >= VISIBLE_KW_LIMIT ? ' data-overflow="1"' : '';
      const hot = k.count >= HOT_THRESHOLD ? ' hot' : '';
      const sid = k.subject_id || '';
      const act = sid ? '클릭으로 위키 페이지' : '클릭으로 검색';
      return `<span class="tag-chip${hot}${hidden}"${overflowAttr}`
           + ` data-sid="${sid}" data-kw="${escapeHtml(k.name)}"`
           + ` title="${escapeHtml(k.name)} (${k.count}회) — ${act}">`
           + `<span class="kw-name">#${escapeHtml(label)}</span>`
           + `<span class="kw-count">${k.count}</span>`
           + `</span>`;
    }).join('');
    const moreHtml = overflow > 0
      ? `<button type="button" class="keywords-more" id="kw-more" data-expanded="0">+ ${overflow}개 더보기</button>`
      : '';
    kwBox.innerHTML = chipsHtml + moreHtml;
    for (const el of kwBox.querySelectorAll('.tag-chip')) {
      el.style.cursor = 'pointer';
      const sid = el.getAttribute('data-sid');
      const kw = el.getAttribute('data-kw');
      el.onclick = () => {
        if (sid) { openEntityPage(sid); }
        else if (kw) { const inp = $('search-input'); if (inp) inp.value = kw; runSearch(kw); }
      };
    }
    const moreBtn = $('kw-more');
    if (moreBtn) {
      moreBtn.onclick = (e) => {
        e.stopPropagation();
        const expanded = moreBtn.dataset.expanded === '1';
        for (const el of kwBox.querySelectorAll('.tag-chip[data-overflow="1"]')) {
          if (expanded) el.classList.add('is-hidden');
          else          el.classList.remove('is-hidden');
        }
        moreBtn.dataset.expanded = expanded ? '0' : '1';
        moreBtn.textContent = expanded ? `+ ${overflow}개 더보기` : '접기';
      };
    }
    kwCount.textContent = keywordsMode === 'workspace'
      ? `${keywords.length} · 전체`
      : `${keywords.length} · 이 범위`;
  }

  if (!summaries || summaries.length === 0) {
    const msg = (turns && turns.length > 0)
      ? '이 범위의 요약은 아직 자비스가 만들지 않았어요 — 다른 세션에서 \'이 날 자비스에 정리해\' 호출 시 생성'
      : '날짜·주제 선택하거나 자비스에서 정리 명령하면 표시';
    summBox.innerHTML = `<div class="empty-mini">${msg}</div>`;
    summCount.textContent = '';
  } else {
    summBox.innerHTML = summaries.map(s => `
      <div class="summary-card">
        <div class="meta">${s.date} · ${escapeHtml(s.subject_name)} · ${s.turn_count} turns</div>
        <div class="content">${safeMarkdown(s.summary)}</div>
      </div>
    `).join('');
    summCount.textContent = summaries.length;
  }
}

// ── Search ──
async function runSearch(query) {
  if (!query || query.trim().length === 0) return;
  state.searchActive = true;
  state.searchQuery = query;
  state.searchFacets = { yearMonth: null, subjectId: null, matchedField: null };
  const center = $('center');
  center.innerHTML = `<div class="search-results"><h2>검색: "${escapeHtml(query)}"</h2><div id="search-loading">검색 중…</div></div>`;
  try {
    const r = await post('/search-episodes', { workspace_id: WORKSPACE_ID, query, limit: 30 });
    state.searchResultsRaw = r.results;
  } catch (e) {
    center.querySelector('.search-results').innerHTML += `<div class="empty">검색 실패: ${e.message}</div>`;
    return;
  }
  renderSearchResults();
}

function filteredSearchResults() {
  const f = state.searchFacets;
  return state.searchResultsRaw.filter(r => {
    if (f.yearMonth && dateKey(r.day_ts || r.created_at).slice(0,7) !== f.yearMonth) return false;
    if (f.matchedField && r.matched_field !== f.matchedField) return false;
    if (f.subjectId) {
      const subs = r.subjects || r.subject_ids || [];
      if (!subs.includes(f.subjectId)) return false;
    }
    return true;
  });
}

function renderSearchResults() {
  const center = $('center');
  const query = state.searchQuery;
  const raw = state.searchResultsRaw;
  const filtered = filteredSearchResults();
  const maxScore = raw.length ? Math.max(...raw.map(r => r.score)) : 1;
  const matchFieldKR = { content: '본문 매치', summary: '요약 매치' };

  // Facet aggregations (over raw — so counts are stable regardless of selection)
  const ymCounts = {};
  const fieldCounts = {};
  const subjectCounts = {};
  for (const r of raw) {
    const ym = dateKey(r.day_ts || r.created_at).slice(0,7);
    ymCounts[ym] = (ymCounts[ym] || 0) + 1;
    fieldCounts[r.matched_field] = (fieldCounts[r.matched_field] || 0) + 1;
    for (const sid of (r.subjects || r.subject_ids || [])) {
      const meta = state.subjectsMap[sid];
      if (!meta || meta.parent_id) continue;  // top-level only
      subjectCounts[sid] = (subjectCounts[sid] || 0) + 1;
    }
  }
  const ymList = Object.entries(ymCounts).sort((a,b) => b[0].localeCompare(a[0]));
  const fieldList = Object.entries(fieldCounts);
  const subjList = Object.entries(subjectCounts).sort((a,b) => b[1] - a[1]);

  const facetHtml = `
    <div class="search-facets">
      <div>
        <h4>날짜</h4>
        ${ymList.map(([ym,n]) => `<div class="facet-item${state.searchFacets.yearMonth===ym?' active':''}" data-facet="ym" data-val="${ym}"><span>${ym}</span><span class="facet-count">${n}</span></div>`).join('')}
      </div>
      ${subjList.length ? `<div>
        <h4>주제</h4>
        ${subjList.map(([sid,n]) => `<div class="facet-item${state.searchFacets.subjectId===sid?' active':''}" data-facet="sid" data-val="${sid}"><span>${escapeHtml(state.subjectsMap[sid].name)}</span><span class="facet-count">${n}</span></div>`).join('')}
      </div>` : ''}
      <div>
        <h4>매치 위치</h4>
        ${fieldList.map(([f,n]) => `<div class="facet-item${state.searchFacets.matchedField===f?' active':''}" data-facet="field" data-val="${f}"><span>${matchFieldKR[f] || f}</span><span class="facet-count">${n}</span></div>`).join('')}
      </div>
      <span class="facet-clear" id="facet-clear">초기화</span>
    </div>
  `;

  const html = filtered.length === 0
    ? '<div class="empty">결과 없음</div>'
    : filtered.map(r => {
        const pct = Math.round((r.score / maxScore) * 100);
        const grade = pct >= 75 ? 'High' : pct >= 35 ? 'Mid' : 'Low';
        const field = matchFieldKR[r.matched_field] || r.matched_field;
        return `
        <div class="search-result" data-eid="${r.episode_id}" data-date="${dateKey(r.day_ts || r.created_at)}">
          <h4>${escapeHtml(r.summary || '(요약 없음)')}</h4>
          <div class="meta">${dateKey(r.day_ts || r.created_at)} · 관련도 ${pct}% (${grade}) · ${field}</div>
          <div class="snippet">${safeMarkdown(r.snippet)}</div>
        </div>`;
      }).join('');

  center.innerHTML = `
    <div class="chat-head"><h1>검색 결과 <span class="tag">${filtered.length}/${raw.length}건</span></h1><div class="meta">"${escapeHtml(query)}"</div></div>
    <div class="search-layout">
      ${facetHtml}
      <div class="search-results">${html}</div>
    </div>`;

  for (const el of center.querySelectorAll('.facet-item')) {
    el.onclick = () => {
      const k = el.getAttribute('data-facet');
      const v = el.getAttribute('data-val');
      const f = state.searchFacets;
      if (k === 'ym') f.yearMonth = (f.yearMonth === v ? null : v);
      else if (k === 'sid') f.subjectId = (f.subjectId === v ? null : v);
      else if (k === 'field') f.matchedField = (f.matchedField === v ? null : v);
      renderSearchResults();
    };
  }
  const clearBtn = center.querySelector('#facet-clear');
  if (clearBtn) clearBtn.onclick = () => {
    state.searchFacets = { yearMonth: null, subjectId: null, matchedField: null };
    renderSearchResults();
  };
  for (const el of center.querySelectorAll('.search-result')) {
    el.onclick = () => {
      const d = el.getAttribute('data-date');
      const eid = el.getAttribute('data-eid');
      state.searchJumpTerm = query;
      state.searchJumpEpisodeId = eid;
      restoreLayout();
      selectDate(d);
    };
  }
}

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
