// ── Entity (wiki) modal ──
async function openEntityPage(entityId, push = true) {
  const modal = $('entity-modal');
  modal.classList.add('open');
  modal.innerHTML = `<div class="entity-modal"><header><div class="ent-meta">로드 중…</div></header></div>`;
  let payload;
  try {
    payload = await post('/entity-page', { workspace_id: WORKSPACE_ID, entity_id: entityId });
  } catch (e) {
    modal.innerHTML = `<div class="entity-modal"><header><h2>로드 실패</h2><div class="ent-meta">${escapeHtml(e.message)}</div></header></div>`;
    return;
  }
  if (push) state.entityStack.push(entityId);
  renderEntityModal(payload);
}
function closeEntityModal() {
  $('entity-modal').classList.remove('open');
  state.entityStack = [];
}
function renderEntityModal(p) {
  const parentLink = p.parent
    ? `<a data-eid="${p.parent.entity_id}" class="ent-link">${escapeHtml(p.parent.name)}</a> / `
    : '';
  const childChips = p.children.slice(0, 24).map(c =>
    `<span class="wiki-chip ent-link" data-eid="${c.entity_id}">${escapeHtml(c.name)}</span>`
  ).join('');
  const aliasLine = p.aliases.length
    ? `<div class="ent-meta">aliases: ${p.aliases.map(escapeHtml).join(', ')}</div>` : '';
  const relChips = p.relations.map(r =>
    `<span class="wiki-chip dir-${r.direction} ent-link" data-eid="${r.other_entity_id}" title="${escapeHtml(r.relation_type)} · weight ${r.weight.toFixed(2)}"><span class="rt">${escapeHtml(r.relation_type)}</span>${escapeHtml(r.other_entity_name)}</span>`
  ).join('');
  const factRows = p.facts.map(f => {
    const supCls = f.superseded_at ? ' superseded' : '';
    const date = (f.valid_from || '').slice(0, 10);
    const quote = f.source_quote ? `<span class="quote">“${escapeHtml(f.source_quote)}”</span>` : '';
    const epLink = f.source_episode_id
      ? `<span title="ep ${String(f.source_episode_id).slice(0,8)}">${date}</span>` : date;
    return `<div class="fact-row${supCls}">
      <div class="pred">${escapeHtml(f.predicate)}</div>
      <div class="obj">${escapeHtml(f.object_value)}${quote}</div>
      <div class="meta">${epLink}</div>
    </div>`;
  }).join('');
  const epRows = p.recent_episodes.map(e => `
    <div class="ep-row" data-date="${e.date}">
      <div class="ep-date">${e.date}</div>
      <div class="ep-sum">${safeMarkdown(e.summary || '')}</div>
      <div class="ep-ct">${e.turn_count} turns</div>
    </div>`).join('');
  const backBtn = state.entityStack.length > 1
    ? `<a class="ent-back" data-back="1">← 뒤로</a> · ` : '';
  // F4: subject_id 가 subjectsMap 에 있으면 "본문 필터링" 버튼 노출 (sub-subject 류).
  // top-level 주제는 parent_id null 이라 제외 — 본문 필터는 sub-subject 단위.
  const subjectMeta = state.subjectsMap[p.entity_id];
  const showFilterBtn = subjectMeta && subjectMeta.parent_id;
  const filterBtn = showFilterBtn
    ? `<button type="button" class="ent-filter-btn" id="ent-filter-btn" title="이 주제로 본문 필터링">이 주제로 본문 보기</button>`
    : '';
  // AI 가 써둔 wiki_article 이 있으면 상단에 우선 표시 (사람이 보는 줄글 설명).
  // 없으면 기존 사실/관계/episode 섹션이 그대로 fallback 으로 보인다.
  const wikiSec = (p.wiki_article && p.wiki_article.trim())
    ? `<div class="sec wiki-article"><h3>위키</h3><div class="wiki-body">${safeMarkdown(p.wiki_article)}</div></div>`
    : '';
  $('entity-modal').innerHTML = `
    <div class="entity-modal">
      <button class="close-x" id="ent-close">×</button>
      <header>
        <div class="crumb">${backBtn}${parentLink}${escapeHtml(p.entity_type)}</div>
        <h2>${escapeHtml(p.name)}</h2>
        ${aliasLine}
        ${filterBtn}
      </header>
      <div class="ent-body">
        ${wikiSec}
        ${childChips ? `<div class="sec"><h3>하위 (${p.children.length})</h3><div class="chips">${childChips}</div></div>` : ''}
        ${relChips ? `<div class="sec"><h3>관계 (${p.relations.length})</h3><div class="chips">${relChips}</div></div>` : ''}
        ${factRows ? `<div class="sec"><h3>사실 (${p.facts.length})</h3>${factRows}</div>` : ''}
        ${epRows ? `<div class="sec"><h3>최근 episode (${p.recent_episodes.length})</h3>${epRows}</div>` : ''}
      </div>
    </div>
  `;
  $('ent-close').onclick = closeEntityModal;
  const fBtn = $('ent-filter-btn');
  if (fBtn) fBtn.onclick = () => {
    closeEntityModal();
    // 현재 검색결과 보고 있으면 본문 layout 으로 복귀.
    if (state.searchActive) restoreLayout();
    selectSub(p.entity_id);
  };
  for (const el of $('entity-modal').querySelectorAll('.ent-link')) {
    el.onclick = (e) => { e.stopPropagation(); openEntityPage(el.getAttribute('data-eid')); };
  }
  const back = $('entity-modal').querySelector('[data-back]');
  if (back) back.onclick = () => {
    state.entityStack.pop();  // current
    const prev = state.entityStack.pop();  // jump
    if (prev) openEntityPage(prev);
    else closeEntityModal();
  };
  for (const el of $('entity-modal').querySelectorAll('.ep-row')) {
    el.onclick = () => {
      const d = el.getAttribute('data-date');
      closeEntityModal();
      restoreLayout();
      selectDate(d);
    };
  }
}

// ── Init ──
async function init() {
  try {
    await pickWorkspace();
    // loadSubTree populates state.subjectsMap which keywords sidebar depends on
    // loadDashboard powers the home page + header stats pill
    // loadLedger populates Ingest 장부 widget (P4)
    // loadBrief drives the Today's Brief card (top of home grid)
    await Promise.all([loadTopics(), loadDateTree(), loadSubTree(), loadDashboard(), loadLedger(), loadOnThisDay(), loadBrief()]);
    // Show home dashboard by default until user picks something
    const head = $('chat-head');
    const stats = state.dashboard?.stats;
    const range = (stats?.first_date && stats?.last_date) ? `${stats.first_date} ~ ${stats.last_date}` : '데이터 누적 중';
    head.innerHTML = renderChatHeadHome(`홈 · ${range}`);
    $('chat-body').innerHTML = renderHomeDashboard();
    wireHomeDashboard();
    // Populate sidebar from workspace-wide aggregates
    const summaries = await fetchSummaries();
    renderKeywordsAndSummary([], summaries);
  } catch (e) {
    $('chat-body').innerHTML = `<div class="empty">초기화 실패: ${e.message}</div>`;
    console.error(e);
  }
}
init();
</script>
